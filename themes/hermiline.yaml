# hermiline.yaml — hermilinChat amber/slate theme for Hermes Agent
#
# After running scripts/install_hermes_themes.py, use this theme via:
#   hermes --theme hermiline.yaml         # (or: --themefile)
#
# Or make it the default:
#   cp hermiline.yaml $HERMES_HOME/theme.yaml
#
# Or drop it in:
#   $HERMES_HOME/themes/hermiline.yaml
#   hermes --theme hermiline.yaml         # auto-found in $HERMES_HOME/themes/
#
# All fields are optional — anything omitted falls back to the baked-in default.
# Colour placeholders like {primary} are interpolated from the "colors" section.

meta:
  name: hermiline
  description: "hermilinChat amber/slate theme"

# ─── Rich markup hex colours ──────────────────────────────────────────
colors:
  primary:      "#f5b731"    # HERMELIN_AMBER_400 — main accent
  secondary:    "#9a6c12"    # HERMELIN_AMBER_700
  tertiary:     "#3d2a08"    # HERMELIN_AMBER_900
  text:         "#b8b8cc"    # HERMELIN_SLATE_TEXT
  text_bright:  "#e8e8f0"    # HERMELIN_SLATE_TEXT_BRIGHT
  muted:        "#55556a"    # HERMELIN_SLATE_MUTED
  border:       "#232330"    # HERMELIN_SLATE_BORDER
  surface:      "#0e0e12"    # HERMELIN_SLATE_SURFACE
  background:   "#08080a"    # HERMELIN_SLATE_BG
  session:      "#55556a"
  success:      "#38c878"
  danger:       "#e84057"

# ─── ANSI escape codes (conversation renderer, response boxes) ────────
ansi:
  accent: "\x1b[38;2;245;183;49m"   # truecolor #f5b731
  bold:   "\x1b[1m"
  dim:    "\x1b[2m"
  reset:  "\x1b[0m"
  muted:  "\x1b[38;2;85;85;106m"    # truecolor #55556a — response box borders

# ─── Branding text ────────────────────────────────────────────────────
branding:
  product_name:     hermilinChat
  org_name:         Nous Research
  tagline:          "Hermes Agent Terminal"
  compact_tagline:  "Hermes Agent Terminal"
  compact_symbol:   "⚕"
  compact_label:    hermilinChat
  panel_title:      hermilinChat
  response_label:   " ⚕ Hermes "
  goodbye:          "Goodbye! ⚕"
  welcome:          "Welcome to hermilinChat! Type your message or /help for commands."

