# matrix-hans.yaml — Matrix (Hans) green theme for Hermes Agent
#
# After running scripts/install_hermes_themes.py (via ./scripts/update.sh), use:
#   hermes --theme matrix-hans.yaml
#
# Or make it the default:
#   cp matrix-hans.yaml $HERMES_HOME/theme.yaml
#
# Or drop it in:
#   $HERMES_HOME/themes/matrix-hans.yaml
#   hermes --theme matrix-hans.yaml       # auto-found in $HERMES_HOME/themes/
#
# All fields are optional — anything omitted falls back to the baked-in default.

meta:
  name: matrix-hans
  description: "Matrix (Hans) green theme"

# ─── Rich markup hex colours ──────────────────────────────────────────
colors:
  primary:      "#4dffa1"    # matrix accent
  secondary:    "#2da565"
  tertiary:     "#1a6b3f"

  text:         "#c8d8d3"
  text_bright:  "#e8f0ec"
  muted:        "#5a6f6a"
  border:       "#2a3533"
  surface:      "#111514"
  background:   "#0c0f0e"
  session:      "#5a6f6a"

  success:      "#4dffa1"
  danger:       "#fb7185"
  info:         "#60a5fa"
  purple:       "#a78bfa"
  cyan:         "#22d3ee"
  yellow:       "#f5e642"

# ─── ANSI escape codes (conversation renderer, response boxes) ────────
ansi:
  accent: "\x1b[38;2;77;255;161m"   # truecolor #4dffa1
  bold:   "\x1b[1m"
  dim:    "\x1b[2m"
  reset:  "\x1b[0m"
  muted:  "\x1b[38;2;90;111;106m"   # truecolor #5a6f6a — response box borders

# ─── Branding text ────────────────────────────────────────────────────
branding:
  product_name:     hermilinChat
  org_name:         Nous Research
  tagline:          "follow the white rabbit…"
  compact_tagline:  "Matrix terminal"
  compact_symbol:   "⚕"
  compact_label:    hermilinChat
  panel_title:      hermilinChat
  response_label:   " ⚕ Hermes "
  goodbye:          "Goodbye! ⚕"
  welcome:          "Welcome to hermilinChat! Type your message or /help for commands."

# ─── ASCII art: large logo (terminal >= 95 cols) ─────────────────────
# Based on /home/wayne/temp/matrix-hans.md
logo_large: |
  [bold {primary}]==================================================================================[/]
  [bold {primary}]  ##  ##    ####    ##  ##   #####        AUTONOMOUS  AGENT  SYSTEM[/]
  [bold {primary}]  ##  ##   ##  ##   ### ##   ##           ~~~~~~~~~~~~~~~~~~~~~~~~[/]
  [bold {primary}]  ######   ######   ######   #####        HERMES AUTONOMOUS NETWORKED[/]
  [bold {primary}]  ##  ##   ##  ##   ## ###       #        SYSTEM  //  NOUS RESEARCH[/]
  [bold {primary}]  ##  ##   ##  ##   ##  ##   #####        ~~~~~~~~~~~~~~~~~~~~~~~~[/]
  [bold {primary}]==================================================================================[/]

# ─── ASCII art: medium logo (terminal 75-94 cols) ────────────────────
logo_medium: |
  [bold {primary}]HERMES[/]  [dim {muted}]AUTONOMOUS AGENT SYSTEM[/]
  [dim {muted}]NOUS RESEARCH · follow the white rabbit…[/]

# ─── ASCII art: small logo (< 75 cols / compact mode) ────────────────
logo_small: |
  [bold {primary}]hermes[/]

