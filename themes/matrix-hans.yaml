# ─── prompt_toolkit style overrides (input area, menus, dialogs) ──────
pt_styles:
  input-area:                            "#c8d8d3"
  placeholder:                           "#555555 italic"
  prompt:                                "#c8d8d3"
  prompt-working:                        "#888888 italic"
  hint:                                  "#555555 italic"
  input-rule:                            "#2a3533"
  image-badge:                           "#87CEEB bold"
  completion-menu:                       "bg:#111514 #c8d8d3"
  completion-menu.completion:            "bg:#111514 #c8d8d3"
  completion-menu.completion.current:    "bg:#2a3533 #4dffa1"
  completion-menu.meta.completion:       "bg:#111514 #888888"
  completion-menu.meta.completion.current: "bg:#2a3533 #2da565"
  clarify-border:                        "#2a3533"
  clarify-title:                         "#4dffa1 bold"
  clarify-question:                      "#c8d8d3 bold"
  clarify-choice:                        "#AAAAAA"
  clarify-selected:                      "#4dffa1 bold"
  clarify-active-other:                  "#4dffa1 italic"
  clarify-countdown:                     "#2da565"
  sudo-prompt:                           "#fb7185 bold"
  sudo-border:                           "#2a3533"
  sudo-title:                            "#fb7185 bold"
  sudo-text:                             "#c8d8d3"
  approval-border:                       "#2a3533"
  approval-title:                        "#4dffa1 bold"
  approval-desc:                         "#c8d8d3 bold"
  approval-cmd:                          "#AAAAAA italic"
  approval-choice:                       "#AAAAAA"
  approval-selected:                     "#4dffa1 bold"
