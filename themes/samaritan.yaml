# samaritan.yaml — Samaritan light theme for Hermes Agent (hermilinChat)
#
# After running scripts/install_hermes_themes.py (via ./scripts/update.sh), use:
#   hermes --theme samaritan.yaml

meta:
  name: samaritan
  description: "Samaritan (light) theme"

colors:
  primary:      "#cc3333"   # accent
  secondary:    "#aa2020"
  tertiary:     "#661212"

  text:         "#3a3835"
  text_bright:  "#1a1816"
  muted:        "#7a7872"
  border:       "#bab8b3"
  surface:      "#dddbd6"
  background:   "#e8e6e1"
  session:      "#7a7872"

  success:      "#2da565"
  danger:       "#aa2020"
  info:         "#cc3333"
  purple:       "#7a50bb"
  cyan:         "#0ea5e9"

ansi:
  accent: "\x1b[38;2;204;51;51m"     # truecolor #cc3333
  bold:   "\x1b[1m"
  dim:    "\x1b[2m"
  reset:  "\x1b[0m"
  muted:  "\x1b[38;2;122;120;114m"   # truecolor #7a7872

branding:
  product_name:     Samaritan
  org_name:         Samaritan
  tagline:          "Samaritan"
  compact_tagline:  "Samaritan"
  compact_symbol:   "▲"
  compact_label:    Samaritan
  panel_title:      Samaritan
  response_label:   " ▲ Samaritan "
  goodbye:          "Goodbye."
  welcome:          "What are your commands?"

pt_styles:
  input-area:                            "#1a1816"
  placeholder:                           "#7a7872 italic"
  prompt:                                "#1a1816"
  prompt-working:                        "#7a7872 italic"
  hint:                                  "#7a7872 italic"
  input-rule:                            "#bab8b3"
  completion-menu:                       "bg:#dddbd6 #1a1816"
  completion-menu.completion:            "bg:#dddbd6 #1a1816"
  completion-menu.completion.current:    "bg:#bab8b3 #cc3333"
  completion-menu.meta.completion:       "bg:#dddbd6 #7a7872"
  completion-menu.meta.completion.current: "bg:#bab8b3 #aa2020"
  clarify-border:                        "#bab8b3"
  clarify-title:                         "#cc3333 bold"
  clarify-question:                      "#1a1816 bold"
  clarify-choice:                        "#3a3835"
  clarify-selected:                      "#cc3333 bold"
  clarify-active-other:                  "#cc3333 italic"
  clarify-countdown:                     "#aa2020"
  sudo-prompt:                           "#aa2020 bold"
  sudo-border:                           "#bab8b3"
  sudo-title:                            "#aa2020 bold"
  sudo-text:                             "#1a1816"
  approval-border:                       "#bab8b3"
  approval-title:                        "#cc3333 bold"
  approval-desc:                         "#1a1816 bold"
  approval-cmd:                          "#7a7872 italic"
  approval-choice:                       "#3a3835"
  approval-selected:                     "#cc3333 bold"

logo_large: |
  [bold {primary}]==================================================================================[/]
  [bold {primary}] _______ _______ _______ _______  ______ _____ _______ _______ __   _             [/]
  [bold {primary}] |______ |_____| |  |  | |_____| |_____/   |      |    |_____| | \  |             [/]
  [bold {primary}] ______| |     | |  |  | |     | |    \_ __|__    |    |     | |  \_|             [/]
  [bold {primary}] Autonomous Agent System                                                          [/]
  [bold {primary}]==================================================================================[/]
