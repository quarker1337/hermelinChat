<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hermelinChat › Strudel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --theme-bg: #0c0f0e;
    --theme-surface: #111514;
    --theme-elevated: #1a201f;
    --theme-border: #243230;
    --theme-muted: #5a7a72;
    --theme-text: #b8d4cb;
    --theme-text-bright: #e2f0ea;
    --theme-accent: #4dffa1;
    --theme-accent-soft: #b7ffd6;
    --theme-accent-muted: #2da565;
    --theme-accent-strong: #1a6b3f;
    --theme-success: #4dffa1;
    --theme-warning: #f0c040;
    --theme-danger: #ff7070;
    --theme-bg-deep: #0a0d0c;
    --theme-scrollbar: #2e4340;
    --theme-scrollbar-hover: #5a7a72;
    --theme-accent-surface: #0a2e1a;
    --theme-danger-surface: #2a101033;
    --theme-accent-glow: rgba(45, 165, 101, 0.27);
    --theme-accent-glow-strong: rgba(77, 255, 161, 0.53);
    --theme-success-glow: rgba(77, 255, 161, 0.27);
    --theme-warning-glow: rgba(240, 192, 64, 0.40);
    --theme-danger-glow: rgba(255, 112, 112, 0.40);
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--theme-bg); }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    color: var(--theme-text);
  }

  /* ── TOOLBAR ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--theme-surface);
    border-bottom: 1px solid var(--theme-border);
    flex-shrink: 0;
    z-index: 10;
  }
  .tbtn {
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--theme-border);
    background: var(--theme-elevated);
    color: var(--theme-text);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tbtn:hover { border-color: var(--theme-accent-muted); color: var(--theme-accent); background: var(--theme-accent-surface); }
  .tbtn:active { transform: scale(0.97); }
  .tbtn.on { background: var(--theme-accent-strong); border-color: var(--theme-accent-muted); color: var(--theme-text-bright); box-shadow: 0 0 10px var(--theme-accent-glow); }
  .tbtn.stopbtn:hover { border-color: var(--theme-danger); color: var(--theme-danger); background: var(--theme-danger-surface); }
  .sep { width: 1px; height: 20px; background: var(--theme-border); margin: 0 4px; }
  .spacer { flex: 1; }
  .hint { font-size: 10px; color: var(--theme-muted); }
  #statusDot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--theme-warning); box-shadow: 0 0 6px var(--theme-warning-glow);
    margin-right: 6px;
  }
  #statusDot.playing { background: var(--theme-success); box-shadow: 0 0 8px var(--theme-success-glow); }

  /* ── AUDIO METER ── */
  .meter-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    max-width: 420px;
    margin: 0 8px;
  }
  .meter-label {
    font-size: 9px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .meter-track {
    flex: 1;
    height: 14px;
    background: var(--theme-bg-deep);
    border-radius: 3px;
    border: 1px solid var(--theme-elevated);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    gap: 1px;
    padding: 2px;
  }
  .meter-seg {
    flex: 1;
    border-radius: 1px;
    background: var(--theme-elevated);
    transition: background 0.06s;
  }
  .meter-seg.on-green { background: var(--theme-success); box-shadow: 0 0 3px var(--theme-success-glow); }
  .meter-seg.on-yellow { background: var(--theme-warning); box-shadow: 0 0 3px var(--theme-warning-glow); }
  .meter-seg.on-red { background: var(--theme-danger); box-shadow: 0 0 4px var(--theme-danger-glow); }
  .meter-db {
    font-size: 10px;
    color: var(--theme-muted);
    min-width: 48px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ── EDITOR CONTAINER ── */
  #editor-container {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── CODEMIRROR THEME OVERRIDES ──
     Force CM internals to follow our --theme-* variables
     so bright skins don't break the editor appearance.
  */
  .cm-editor {
    background: var(--theme-bg) !important;
    color: var(--theme-text) !important;
  }
  .cm-editor .cm-content {
    color: var(--theme-text) !important;
    caret-color: var(--theme-accent) !important;
  }
  .cm-editor .cm-cursor, .cm-editor .cm-dropCursor {
    border-left-color: var(--theme-accent) !important;
  }
  .cm-editor .cm-gutters {
    background: var(--theme-surface) !important;
    color: var(--theme-muted) !important;
    border-right: 1px solid var(--theme-border) !important;
  }
  .cm-editor .cm-activeLineGutter {
    background: var(--theme-elevated) !important;
    color: var(--theme-text-bright) !important;
  }
  .cm-editor .cm-activeLine {
    background: var(--theme-elevated) !important;
  }
  .cm-editor .cm-selectionBackground,
  .cm-editor .cm-focused .cm-selectionBackground,
  ::selection {
    background: var(--theme-accent-surface) !important;
  }
  .cm-editor .cm-matchingBracket {
    background: var(--theme-accent-surface) !important;
    color: var(--theme-accent) !important;
    outline: 1px solid var(--theme-accent-muted);
  }
  .cm-editor .cm-searchMatch {
    background: var(--theme-warning-glow) !important;
  }
  .cm-editor .cm-tooltip {
    background: var(--theme-surface) !important;
    color: var(--theme-text) !important;
    border: 1px solid var(--theme-border) !important;
  }
  .cm-editor .cm-tooltip-autocomplete ul li[aria-selected] {
    background: var(--theme-accent-surface) !important;
    color: var(--theme-text-bright) !important;
  }
  .cm-editor .cm-panels {
    background: var(--theme-surface) !important;
    color: var(--theme-text) !important;
  }

  /* ── SYNTAX HIGHLIGHTING ──
     CM6 syntax tokens use generated scoped classes (ͼ1.ͼc etc.)
     that beat static CSS specificity. The JS function injectCMOverrides()
     reads CM's computed colors, classifies each token role, and injects
     a dynamic <style> with the correct theme colors.
     The static .cm-editor rules above serve as fallback for chrome elements.
  */

  /* ── Flash/highlight animation on eval ── */
  .cm-editor .cm-line.flash {
    background: var(--theme-accent-glow) !important;
  }

  /* Only touch cm-scroller overflow — nothing else */
  .cm-scroller {
    overflow: auto !important;
    scrollbar-width: thin;
    scrollbar-color: var(--theme-scrollbar) var(--theme-surface);
  }
  .cm-scroller::-webkit-scrollbar { width: 8px; height: 8px; }
  .cm-scroller::-webkit-scrollbar-track { background: var(--theme-surface); }
  .cm-scroller::-webkit-scrollbar-thumb { background: var(--theme-scrollbar); border-radius: 4px; min-height: 40px; }
  .cm-scroller::-webkit-scrollbar-thumb:hover { background: var(--theme-scrollbar-hover); }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span id="statusDot"></span>
    <button class="tbtn" id="btnPlay" onclick="doPlay()">▶ Play</button>
    <button class="tbtn stopbtn" id="btnStop" onclick="doStop()">■ Stop</button>
    <div class="sep"></div>
    <div class="meter-wrap">
      <span class="meter-label">out</span>
      <div class="meter-track" id="meterTrack"></div>
      <span class="meter-db" id="meterDb">-∞ dB</span>
    </div>
  </div>

  <div id="editor-container">
    <strudel-editor id="repl">
<!--
// hermelinChat × Strudel
// paste your pattern here, press ctrl+enter or ▶ Play
setcps(0.5)

s("bd sd")
-->
    </strudel-editor>
  </div>
</div>

<script>
// Wait for the web component to fully init, then grab the API
let api = null;
let isPlaying = false;
let bridgeReadySent = false;

function emitHermesEvent(eventName, payload = {}, requestId = null) {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: 'hermes:artifact-event',
        channel: 'strudel',
        event: eventName,
        requestId,
        payload,
      }, '*');
    }
  } catch (e) {
    console.warn('[hermelinChat] bridge emit failed:', e);
  }
}

function currentCode() {
  try {
    return api?.editor?.state?.doc?.toString?.() ?? api?.code ?? '';
  } catch {
    return api?.code ?? '';
  }
}

function currentCodeSummary() {
  const code = currentCode();
  return {
    code_length: code.length,
    line_count: code === '' ? 0 : code.split(/\r?\n/).length,
  };
}

function currentCursor() {
  try {
    return Number(api?.getCursorLocation?.() ?? 0);
  } catch {
    return 0;
  }
}

function setPlayUi(playing) {
  isPlaying = !!playing;
  document.getElementById('btnPlay').classList.toggle('on', isPlaying);
  document.getElementById('statusDot').classList.toggle('playing', isPlaying);
}

function tryGetAPI() {
  const el = document.getElementById('repl');
  if (el && el.editor) {
    api = el.editor;
    console.log('[hermelinChat] StrudelMirror API ready:', Object.keys(api));
    if (!bridgeReadySent) {
      bridgeReadySent = true;
      emitHermesEvent('ready', {
        capabilities: [
          'get-code',
          'set-code',
          'append-code',
          'replace-range',
          'get-cursor',
          'set-cursor',
          'play',
          'stop',
        ],
      });
      // CM is now rendered — re-inject theme overrides after a short delay
      // so syntax highlight spans exist for classification
      setTimeout(() => {
        if (typeof _lastThemeColors !== 'undefined' && _lastThemeColors) {
          const lum = relativeLuminance(_lastThemeColors.bg);
          injectCMOverrides(_lastThemeColors, lum > 0.35);
        }
      }, 500);
    }
    return true;
  }
  return false;
}

// Poll until ready
if (!tryGetAPI()) {
  const iv = setInterval(() => {
    if (tryGetAPI()) clearInterval(iv);
  }, 300);
}

function doPlay() {
  if (!api) { console.warn('Editor not ready'); return; }
  try {
    api.evaluate();
    setPlayUi(true);
    emitHermesEvent('playing', { playing: true });
  } catch(e) { console.error(e); }
}

function doStop() {
  if (!api) { console.warn('Editor not ready'); return; }
  try {
    api.stop();
  } catch(e) { console.error(e); }
  setPlayUi(false);
  emitHermesEvent('playing', { playing: false });
}

function handleHermesCommand(message) {
  if (!api) {
    emitHermesEvent('error', { message: 'Editor not ready' }, message.requestId || null);
    return;
  }

  const command = String(message.command || '').trim();
  const requestId = message.requestId || null;
  const payload = message.payload && typeof message.payload === 'object' ? message.payload : {};

  try {
    switch (command) {
      case 'get-code': {
        const code = currentCode();
        emitHermesEvent('code', { code, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'set-code': {
        api.setCode(String(payload.code ?? ''));
        emitHermesEvent('ack', { action: command, ok: true, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'append-code': {
        api.appendCode(String(payload.text ?? ''));
        emitHermesEvent('ack', { action: command, ok: true, inserted_length: String(payload.text ?? '').length, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'replace-range': {
        const text = String(payload.text ?? '');
        const full = currentCode();
        const from = Math.max(0, Math.min(full.length, Number(payload.from ?? 0)));
        const to = Math.max(from, Math.min(full.length, Number(payload.to ?? from)));
        api.editor.dispatch({ changes: { from, to, insert: text } });
        emitHermesEvent('ack', { action: command, ok: true, from, to, inserted_length: text.length, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'get-cursor':
        emitHermesEvent('cursor', { position: currentCursor() }, requestId);
        return;
      case 'set-cursor': {
        const position = Math.max(0, Number(payload.position ?? 0));
        api.setCursorLocation(position);
        emitHermesEvent('ack', { action: command, ok: true, position: currentCursor() }, requestId);
        return;
      }
      case 'play':
        doPlay();
        emitHermesEvent('ack', { action: command, ok: true, playing: true }, requestId);
        return;
      case 'stop':
        doStop();
        emitHermesEvent('ack', { action: command, ok: true, playing: false }, requestId);
        return;
      default:
        emitHermesEvent('error', { message: `Unknown command: ${command}` }, requestId);
    }
  } catch (err) {
    console.error(err);
    emitHermesEvent('error', { message: err?.message || String(err), command }, requestId);
  }
}

const THEME_DEFAULTS = Object.freeze({
  bg: '#0c0f0e',
  surface: '#111514',
  elevated: '#1a201f',
  border: '#243230',
  muted: '#5a7a72',
  text: '#b8d4cb',
  textBright: '#e2f0ea',
  accent: '#4dffa1',
  accentSoft: '#b7ffd6',
  accentMuted: '#2da565',
  accentStrong: '#1a6b3f',
  success: '#4dffa1',
  warning: '#f0c040',
  danger: '#ff7070',
});

function hexToRgb(hex) {
  const raw = String(hex || '').trim().replace(/^#/, '');
  if (!raw) return [128, 128, 128];
  const normalized = raw.length === 3 ? raw.split('').map((ch) => ch + ch).join('') : raw.slice(0, 6);
  if (normalized.length !== 6) return [128, 128, 128];
  const int = Number.parseInt(normalized, 16);
  if (Number.isNaN(int)) return [128, 128, 128];
  return [(int >> 16) & 255, (int >> 8) & 255, int & 255];
}

function relativeLuminance(hex) {
  const [r, g, b] = hexToRgb(hex).map(c => {
    const s = c / 255;
    return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function darkenHex(hex, amount) {
  // amount 0..1, where 0 = no change, 1 = black
  const [r, g, b] = hexToRgb(hex);
  const f = 1 - amount;
  const dr = Math.round(r * f);
  const dg = Math.round(g * f);
  const db = Math.round(b * f);
  return '#' + [dr, dg, db].map(c => c.toString(16).padStart(2, '0')).join('');
}

function hexToRgba(hex, alpha) {
  const raw = String(hex || '').trim().replace(/^#/, '');
  if (!raw) return `rgba(255, 255, 255, ${alpha})`;
  const normalized = raw.length === 3 ? raw.split('').map((ch) => ch + ch).join('') : raw.slice(0, 6);
  if (normalized.length !== 6) return `rgba(255, 255, 255, ${alpha})`;
  const int = Number.parseInt(normalized, 16);
  if (Number.isNaN(int)) return `rgba(255, 255, 255, ${alpha})`;
  const r = (int >> 16) & 255;
  const g = (int >> 8) & 255;
  const b = int & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function normalizeThemeColors(raw) {
  const next = { ...THEME_DEFAULTS };
  for (const [key, value] of Object.entries(raw || {})) {
    if (typeof value === 'string' && value.trim()) next[key] = value.trim();
  }
  return next;
}

let _lastThemeColors = null;

function applyHermesTheme(theme) {
  const colors = normalizeThemeColors(theme?.colors);
  _lastThemeColors = colors;
  const root = document.documentElement;
  root.style.setProperty('--theme-bg', colors.bg);
  root.style.setProperty('--theme-surface', colors.surface);
  root.style.setProperty('--theme-elevated', colors.elevated);
  root.style.setProperty('--theme-border', colors.border);
  root.style.setProperty('--theme-muted', colors.muted);
  root.style.setProperty('--theme-text', colors.text);
  root.style.setProperty('--theme-text-bright', colors.textBright);
  root.style.setProperty('--theme-accent', colors.accent);
  root.style.setProperty('--theme-accent-soft', colors.accentSoft);
  root.style.setProperty('--theme-accent-muted', colors.accentMuted);
  root.style.setProperty('--theme-accent-strong', colors.accentStrong);
  root.style.setProperty('--theme-success', colors.success);
  root.style.setProperty('--theme-warning', colors.warning);
  root.style.setProperty('--theme-danger', colors.danger);
  root.style.setProperty('--theme-bg-deep', hexToRgba(colors.bg, 0.82));
  root.style.setProperty('--theme-scrollbar', hexToRgba(colors.muted, 0.55));
  root.style.setProperty('--theme-scrollbar-hover', hexToRgba(colors.muted, 0.8));
  root.style.setProperty('--theme-accent-surface', hexToRgba(colors.accentStrong, 0.22));
  root.style.setProperty('--theme-danger-surface', hexToRgba(colors.danger, 0.14));
  root.style.setProperty('--theme-accent-glow', hexToRgba(colors.accentMuted, 0.27));
  root.style.setProperty('--theme-accent-glow-strong', hexToRgba(colors.accent, 0.53));
  root.style.setProperty('--theme-success-glow', hexToRgba(colors.success, 0.27));
  root.style.setProperty('--theme-warning-glow', hexToRgba(colors.warning, 0.4));
  root.style.setProperty('--theme-danger-glow', hexToRgba(colors.danger, 0.4));

  // ── Detect light vs dark ──
  const bgLum = relativeLuminance(colors.bg);
  const isLight = bgLum > 0.35;

  // For light themes, also override the general text variables
  if (isLight) {
    root.style.setProperty('--theme-muted',       darkenHex(colors.muted, 0.25));
    root.style.setProperty('--theme-text',        darkenHex(colors.text, 0.45));
    root.style.setProperty('--theme-text-bright', darkenHex(colors.textBright, 0.55));
  }

  // Inject CM overrides after CM has rendered
  requestAnimationFrame(() => injectCMOverrides(colors, isLight));
}

// ── Dynamic CM6 style override injection ──
// CM6 themes use EditorView.theme() which creates generated class names
// (e.g. .ͼ1 .ͼc for comments, .ͼ1 .ͼe for keywords, etc.)
// These rules live in adopted stylesheets or injected <style> tags
// and have specificity we can't reliably beat with static CSS.
//
// Our approach:
// 1. Find every unique class combination on syntax spans inside .cm-line
// 2. Read the computed color for each
// 3. Map the computed color to a "role" (is it the comment color? keyword color? etc.)
//    by comparing against known CM default dark-theme colors
// 4. Build override rules using the exact same class selectors, with our theme colors
// 5. Append the <style> after CM's styles so we win on source order at equal specificity

let _cmOverrideStyle = null;

// Known CM default highlight colors (from Strudel's dark theme / one-dark-ish defaults)
// Used as hints to classify token roles when possible.
const CM_ROLE_HINTS = {
  '#7c7c7c': 'comment', '#7f8c98': 'comment', '#6a9955': 'comment', '#808080': 'comment', '#5c6370': 'comment',
  '#c678dd': 'keyword', '#cc99cd': 'keyword', '#cf8fff': 'keyword', '#c792ea': 'keyword',
  '#e06c75': 'keyword',
  '#98c379': 'string', '#a8ff60': 'string', '#c3e88d': 'string', '#9ece6a': 'string', '#e5c07b': 'string',
  '#d19a66': 'number', '#f78c6c': 'number', '#ffcb6b': 'number',
  '#61afef': 'definition', '#82aaff': 'definition', '#8be9fd': 'definition',
  '#abb2bf': 'variable', '#d4d4d4': 'variable', '#e0e0e0': 'variable',
  '#56b6c2': 'operator', '#89ddff': 'operator',
};

function colorDistance(hex1, hex2) {
  const [r1, g1, b1] = hexToRgb(hex1);
  const [r2, g2, b2] = hexToRgb(hex2);
  return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

function rgbStringToHex(rgb) {
  if (!rgb) return null;
  const m = rgb.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/);
  if (!m) return null;
  return '#' + [m[1], m[2], m[3]].map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
}

// WCAG contrast ratio between two hex colors
function contrastRatio(hex1, hex2) {
  const l1 = relativeLuminance(hex1);
  const l2 = relativeLuminance(hex2);
  const lighter = Math.max(l1, l2);
  const darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

// Darken a color progressively until it meets minimum contrast against bg
function ensureContrast(fgHex, bgHex, minRatio = 4.5) {
  let fg = fgHex;
  for (let step = 0; step < 10; step++) {
    if (contrastRatio(fg, bgHex) >= minRatio) return fg;
    fg = darkenHex(fg, 0.15); // darken 15% each step
  }
  return fg;
}

// Lighten a color for dark backgrounds if needed
function lightenHex(hex, amount) {
  const [r, g, b] = hexToRgb(hex);
  const f = amount;
  const lr = Math.min(255, Math.round(r + (255 - r) * f));
  const lg = Math.min(255, Math.round(g + (255 - g) * f));
  const lb = Math.min(255, Math.round(b + (255 - b) * f));
  return '#' + [lr, lg, lb].map(c => c.toString(16).padStart(2, '0')).join('');
}

function ensureContrastAuto(fgHex, bgHex, minRatio = 4.5) {
  // If bg is light, darken fg. If bg is dark, lighten fg.
  const bgLum = relativeLuminance(bgHex);
  let fg = fgHex;
  for (let step = 0; step < 12; step++) {
    if (contrastRatio(fg, bgHex) >= minRatio) return fg;
    fg = bgLum > 0.5 ? darkenHex(fg, 0.12) : lightenHex(fg, 0.12);
  }
  return fg;
}

function injectCMOverrides(colors, isLight) {
  const cmEditor = document.querySelector('.cm-editor');
  if (!cmEditor) return;

  // Remove previous override sheet
  if (_cmOverrideStyle) {
    _cmOverrideStyle.remove();
    _cmOverrideStyle = null;
  }

  const textColor = isLight ? darkenHex(colors.text, 0.45) : colors.text;
  const mutedColor = isLight ? darkenHex(colors.muted, 0.25) : colors.muted;
  const brightColor = isLight ? darkenHex(colors.textBright, 0.55) : colors.textBright;
  const accentColor = isLight ? darkenHex(colors.accent, 0.50) : colors.accent;
  const surfaceColor = colors.surface;
  const borderColor = colors.border;
  const bgColor = colors.bg;
  const elevatedColor = colors.elevated;

  // Scan syntax spans: read their computed color, ensure contrast against new bg
  const classToColor = {};
  const spans = cmEditor.querySelectorAll('.cm-line span[class]');
  spans.forEach(span => {
    const cls = span.className.trim();
    if (!cls || classToColor[cls] !== undefined) return;
    if (!/ͼ/.test(cls)) return;
    const computed = window.getComputedStyle(span).color;
    const hex = rgbStringToHex(computed);
    if (!hex) return;
    // Ensure this color has readable contrast against the new background
    classToColor[cls] = ensureContrastAuto(hex, bgColor, 4.5);
  });

  // Build syntax override rules
  let syntaxRules = '';
  for (const [cls, color] of Object.entries(classToColor)) {
    const selector = cls.split(/\s+/).filter(Boolean).map(c => `.${c}`).join('');
    syntaxRules += `  .cm-editor ${selector} { color: ${color} !important; }\n`;
  }

  const css = `
/* ── hermelinChat CM6 theme overrides (injected dynamically) ── */

/* Editor chrome */
.cm-editor { background: ${bgColor} !important; color: ${textColor} !important; }
.cm-editor .cm-content { color: ${textColor} !important; caret-color: ${accentColor} !important; }
.cm-editor .cm-cursor, .cm-editor .cm-dropCursor { border-left-color: ${accentColor} !important; }
.cm-editor .cm-gutters { background: ${surfaceColor} !important; color: ${mutedColor} !important; border-right: 1px solid ${borderColor} !important; }
.cm-editor .cm-activeLineGutter { background: ${elevatedColor} !important; color: ${brightColor} !important; }
.cm-editor .cm-activeLine { background: ${elevatedColor} !important; }
.cm-editor .cm-selectionBackground { background: ${hexToRgba(colors.accentStrong, 0.22)} !important; }
.cm-editor .cm-matchingBracket { background: ${hexToRgba(colors.accentStrong, 0.22)} !important; color: ${accentColor} !important; }
.cm-editor .cm-tooltip { background: ${surfaceColor} !important; color: ${textColor} !important; border: 1px solid ${borderColor} !important; }

/* Syntax highlighting — mapped from CM's generated classes */
${syntaxRules}

/* Inline visualizations (pianoroll, scope, punchcard, etc.)
   These render on <canvas> with colors meant for dark backgrounds.
   On light themes, add a dark backdrop so they stay visible. */
${isLight ? `
.cm-editor .cm-widgetBuffer + .cm-line canvas,
.cm-editor .cm-line canvas,
.cm-editor .cm-widget canvas,
.cm-editor canvas {
  background: rgba(0, 0, 0, 0.75) !important;
  border-radius: 4px;
}
/* Also catch the widget wrapper divs that contain canvases */
.cm-editor .cm-widgetBuffer + * canvas,
.cm-editor div[class*="widget"] canvas {
  background: rgba(0, 0, 0, 0.75) !important;
  border-radius: 4px;
}
` : ''}
`;

  _cmOverrideStyle = document.createElement('style');
  _cmOverrideStyle.id = 'hermelin-cm-overrides';
  _cmOverrideStyle.textContent = css;
  document.head.appendChild(_cmOverrideStyle);

  // Clear inline styles CM may have set
  cmEditor.style.backgroundColor = '';
  cmEditor.style.color = '';
  const gutters = cmEditor.querySelector('.cm-gutters');
  if (gutters) { gutters.style.backgroundColor = ''; gutters.style.color = ''; gutters.style.borderRight = ''; }
  const content = cmEditor.querySelector('.cm-content');
  if (content) { content.style.color = ''; content.style.caretColor = ''; }

  console.log('[hermelinChat] CM overrides injected, isLight:', isLight, 'overrides:', Object.keys(classToColor).length);
}

applyHermesTheme({ colors: THEME_DEFAULTS });

window.addEventListener('message', (event) => {
  const message = event.data;
  if (!message || typeof message !== 'object') return;
  if (message.type === 'hermes:artifact-theme') {
    applyHermesTheme(message.theme || null);
    return;
  }
  if (message.type !== 'hermes:artifact-command') return;
  if (String(message.channel || 'strudel') !== 'strudel') return;
  handleHermesCommand(message);
});

// ── AUDIO LEVEL METER ──
const METER_SEGS = 32;
const meterTrack = document.getElementById('meterTrack');
for (let i = 0; i < METER_SEGS; i++) {
  const seg = document.createElement('div');
  seg.className = 'meter-seg';
  meterTrack.appendChild(seg);
}
const meterSegs = meterTrack.querySelectorAll('.meter-seg');
const meterDbEl = document.getElementById('meterDb');

let analyser = null;
let analyserData = null;
let meterRunning = false;

// Patch: intercept connections to audio destination so we can meter them
function setupMeter() {
  try {
    const ctx = typeof getAudioContext === 'function' ? getAudioContext() : null;
    if (!ctx) { setTimeout(setupMeter, 500); return; }
    if (analyser) return; // already set up

    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.65;
    analyserData = new Float32Array(analyser.fftSize);

    // Insert analyser between everything and the destination:
    // Monkey-patch connect() on all AudioNodes to also feed our analyser
    const origConnect = AudioNode.prototype.connect;
    AudioNode.prototype.connect = function(dest, ...args) {
      const result = origConnect.call(this, dest, ...args);
      // If something connects to the final destination, also connect to analyser
      if (dest === ctx.destination) {
        try { origConnect.call(this, analyser); } catch(e) {}
      }
      return result;
    };

    if (!meterRunning) {
      meterRunning = true;
      meterLoop();
    }
    console.log('[hermelinChat] Audio meter ready');
  } catch(e) {
    console.warn('[hermelinChat] Meter setup failed:', e);
  }
}

function meterLoop() {
  requestAnimationFrame(meterLoop);
  if (!analyser || !analyserData) return;

  analyser.getFloatTimeDomainData(analyserData);

  let peak = 0;
  for (let i = 0; i < analyserData.length; i++) {
    const v = Math.abs(analyserData[i]);
    if (v > peak) peak = v;
  }
  const db = peak > 0.0001 ? 20 * Math.log10(peak) : -Infinity;

  const minDb = -50;
  const ratio = Math.max(0, Math.min(1, (db - minDb) / (0 - minDb)));
  const litSegs = Math.round(ratio * METER_SEGS);

  for (let i = 0; i < METER_SEGS; i++) {
    if (i < litSegs) {
      const pos = i / METER_SEGS;
      if (pos > 0.88) meterSegs[i].className = 'meter-seg on-red';
      else if (pos > 0.68) meterSegs[i].className = 'meter-seg on-yellow';
      else meterSegs[i].className = 'meter-seg on-green';
    } else {
      meterSegs[i].className = 'meter-seg';
    }
  }

  if (db > -100) {
    meterDbEl.textContent = db.toFixed(1) + ' dB';
    meterDbEl.style.color = db > -3 ? 'var(--theme-danger)' : db > -10 ? 'var(--theme-warning)' : 'var(--theme-muted)';
  } else {
    meterDbEl.textContent = '-∞ dB';
    meterDbEl.style.color = 'var(--theme-muted)';
  }
}

// Init meter early so the patch is in place before strudel connects anything
setTimeout(setupMeter, 300);

// ── Fix scrollbar: constrain heights via JS after editor renders ──
function fixEditorScroll() {
  const container = document.getElementById('editor-container');
  if (!container) return false;
  const cmEditor = container.querySelector('.cm-editor');
  if (!cmEditor) return false;

  // Get the available height
  const h = container.offsetHeight;
  if (h < 10) return false; // not laid out yet

  // Set max-height on cm-editor so cm-scroller overflows
  cmEditor.style.maxHeight = h + 'px';
  cmEditor.style.overflow = 'hidden';

  // Also constrain the wrapper div between strudel-editor and cm-editor
  const wrapper = cmEditor.parentElement;
  if (wrapper && wrapper !== container && wrapper.tagName !== 'STRUDEL-EDITOR') {
    wrapper.style.maxHeight = h + 'px';
    wrapper.style.overflow = 'hidden';
  }

  console.log('[hermelinChat] Scroll fix applied, height:', h);
  return true;
}

// Try after a delay, and on resize
setTimeout(() => {
  if (!fixEditorScroll()) {
    const iv2 = setInterval(() => {
      if (fixEditorScroll()) clearInterval(iv2);
    }, 500);
  }
}, 1000);
window.addEventListener('resize', () => fixEditorScroll());
</script>
