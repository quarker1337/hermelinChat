<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HANS / STRUDEL</title>
    <style>
      :root {
        /* hermilinChat matrix palette */
        --bg: #0c0f0e;
        --surface: #111514;
        --elev: #1a201f;
        --border: #2a3533;
        --muted: #5a6f6a;
        --text: #c8d8d3;
        --bright: #e8f0ec;

        --accent: #4dffa1;
        --warn: #f5e642;
        --danger: #fb7185;
        --cyan: #22d3ee;

        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

        /* Strudel / CodeMirror theme vars (fallbacks seen on strudel.cc) */
        --background: var(--bg);
        --lineBackground: rgba(17, 21, 20, 0.70);
        --foreground: var(--text);
        --caret: var(--accent);
        --selection: rgba(77, 255, 161, 0.22);
        --selectionMatch: rgba(34, 211, 238, 0.18);
        --lineHighlight: rgba(77, 255, 161, 0.08);
        --gutterBackground: transparent;
        --gutterForeground: rgba(90, 111, 106, 0.88);

        --font-family: var(--mono);
        --font-size: 13px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--mono);
        color: var(--text);
        background:
          radial-gradient(1100px 700px at 20% 10%, rgba(77, 255, 161, 0.10), transparent 55%),
          radial-gradient(900px 650px at 85% 20%, rgba(34, 211, 238, 0.07), transparent 52%),
          radial-gradient(1100px 900px at 70% 85%, rgba(251, 113, 133, 0.06), transparent 60%),
          var(--bg);
        overflow: hidden;
      }

      .fx {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .fx .scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0) 6px
        );
        opacity: 0.18;
        mix-blend-mode: overlay;
      }

      .fx .vignette {
        position: absolute;
        inset: -30px;
        background: radial-gradient(closest-side at 50% 50%, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.55));
        opacity: 0.55;
      }

      .wrap {
        height: 100%;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        position: relative;
        z-index: 1;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 12px;
        border: 1px solid rgba(77, 255, 161, 0.18);
        background: linear-gradient(180deg, rgba(26, 32, 31, 0.75), rgba(17, 21, 20, 0.55));
        border-radius: 10px;
        min-width: 0;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .title {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .subtitle {
        font-size: 10px;
        color: rgba(200, 216, 211, 0.62);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
        align-items: center;
        font-size: 10px;
        color: rgba(200, 216, 211, 0.65);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid rgba(77, 255, 161, 0.16);
        background: rgba(12, 15, 14, 0.45);
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(77, 255, 161, 0.25);
      }

      .dot.warn {
        background: var(--warn);
        box-shadow: 0 0 18px rgba(245, 230, 66, 0.20);
      }

      .panel {
        min-height: 0;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(77, 255, 161, 0.16);
        background: rgba(17, 21, 20, 0.55);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25) inset;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .panelHeader {
        padding: 10px 12px;
        background: rgba(26, 32, 31, 0.65);
        border-bottom: 1px solid rgba(77, 255, 161, 0.10);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
      }

      .h {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(232, 240, 236, 0.86);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hRight {
        font-size: 10px;
        color: rgba(200, 216, 211, 0.62);
        white-space: nowrap;
      }

      .panelBody {
        min-height: 0;
        padding: 10px 10px;
        background: rgba(12, 15, 14, 0.25);
      }

      strudel-editor {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 360px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(77, 255, 161, 0.12);
        background: var(--bg);
      }

      .hint {
        color: rgba(200, 216, 211, 0.62);
      }

      code {
        color: rgba(232, 240, 236, 0.90);
      }

      a {
        color: rgba(34, 211, 238, 0.95);
      }
    </style>
  </head>
  <body>
    <div class="fx">
      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>

    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="title">HANS / STRUDEL</div>
          <div class="subtitle">live coding repl • embedded web component • matrix skin</div>
        </div>
        <div class="meta">
          <div class="pill"><span class="dot warn"></span><span>audio requires click</span></div>
          <div class="pill"><span>source</span> <code>@strudel/repl</code></div>
        </div>
      </div>

      <div class="panel">
        <div class="panelHeader">
          <div class="h">Strudel editor</div>
          <div class="hRight hint">Tip: click inside, then press Play</div>
        </div>
        <div class="panelBody">
          <!-- pinned to a known-good version for video stability -->
          <script src="https://unpkg.com/@strudel/repl@1.3.0"></script>

          <strudel-editor>
            <!--
setcps(1)

stack(
  note("<c2 a1 f1 e1>*2").s("sawtooth").lpf(600).gain(0.18),
  note("<c4 a3 f3 e3>*4").s("square").lpf(sine.range(500,6000).slow(8)).room(0.8).gain(0.12)
).slow(2)
            -->
          </strudel-editor>
        </div>
      </div>
    </div>
  </body>
</html>
