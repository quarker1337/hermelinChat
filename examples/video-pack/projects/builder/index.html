<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HANS Video Helpers</title>
    <style>
      :root {
        /* Align with hermilinChat matrix theme palette */
        --bg: #0c0f0e;
        --surface: #111514;
        --elev: #1a201f;
        --border: #2a3533;
        --muted: #5a6f6a;
        --text: #c8d8d3;
        --bright: #e8f0ec;

        --accent: #4dffa1;
        --warn: #f5e642;
        --danger: #fb7185;
        --cyan: #22d3ee;

        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--mono);
        color: var(--text);
        background:
          radial-gradient(1100px 700px at 20% 10%, rgba(77, 255, 161, 0.10), transparent 55%),
          radial-gradient(900px 650px at 85% 20%, rgba(34, 211, 238, 0.07), transparent 52%),
          radial-gradient(1100px 900px at 70% 85%, rgba(251, 113, 133, 0.06), transparent 60%),
          var(--bg);
        overflow: hidden;
      }

      .fx {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .fx .scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0) 6px
        );
        opacity: 0.18;
        mix-blend-mode: overlay;
      }

      .fx .vignette {
        position: absolute;
        inset: -30px;
        background: radial-gradient(closest-side at 50% 50%, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.55));
        opacity: 0.55;
      }

      .wrap {
        height: 100%;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 12px;
        border: 1px solid rgba(77, 255, 161, 0.18);
        background: linear-gradient(180deg, rgba(26, 32, 31, 0.75), rgba(17, 21, 20, 0.55));
        border-radius: 10px;
        min-width: 0;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .title {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .subtitle {
        font-size: 10px;
        color: rgba(200, 216, 211, 0.62);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 10px;
        color: rgba(200, 216, 211, 0.65);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(77, 255, 161, 0.16);
        background: rgba(12, 15, 14, 0.45);
      }

      .pill b {
        color: rgba(232, 240, 236, 0.88);
        font-weight: 800;
        letter-spacing: 0.06em;
      }

      select {
        appearance: none;
        background: rgba(12, 15, 14, 0.55);
        border: 1px solid rgba(77, 255, 161, 0.16);
        color: rgba(232, 240, 236, 0.90);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 6px 10px;
        border-radius: 10px;
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: rgba(77, 255, 161, 0.45);
        box-shadow: 0 0 0 2px rgba(77, 255, 161, 0.10);
      }

      .panel {
        min-height: 0;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(77, 255, 161, 0.16);
        background: rgba(17, 21, 20, 0.55);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25) inset;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .panelHeader {
        padding: 10px 12px;
        background: rgba(26, 32, 31, 0.65);
        border-bottom: 1px solid rgba(77, 255, 161, 0.10);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
      }

      .panelHeader .h {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(232, 240, 236, 0.86);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panelHeader .hint {
        font-size: 10px;
        color: rgba(200, 216, 211, 0.62);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panelBody {
        min-height: 0;
        background: rgba(12, 15, 14, 0.25);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }

      .kbd {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(200, 216, 211, 0.62);
      }

      .kbd b {
        color: rgba(232, 240, 236, 0.86);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="fx">
      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>

    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="title">HANS / VIDEO HELPERS</div>
          <div class="subtitle">intro/outro recorder • overlay recorder • matrix tools</div>
        </div>

        <div class="controls">
          <div class="pill">
            <span>tool</span>
            <select id="tool">
              <option value="video">Intro / Outro Recorder</option>
              <option value="overlay">Text Overlay Recorder</option>
            </select>
          </div>
          <div class="pill kbd"><b>1</b> video <b>2</b> overlay</div>
        </div>
      </div>

      <div class="panel">
        <div class="panelHeader">
          <div class="h" id="toolName">TOOL</div>
          <div class="hint" id="toolHint">…</div>
        </div>
        <div class="panelBody">
          <iframe id="toolFrame" title="HANS Video Helper" src=""></iframe>
        </div>
      </div>
    </div>

    <script>
      const toolSelect = document.getElementById('tool')
      const toolName = document.getElementById('toolName')
      const toolHint = document.getElementById('toolHint')
      const toolFrame = document.getElementById('toolFrame')

      const TOOLS = {
        video: {
          label: 'INTRO / OUTRO RECORDER',
          hint: 'canvas intro/outro animation + webm capture (vp9)',
          file: 'hans-video-recorder.html',
        },
        overlay: {
          label: 'TEXT OVERLAY RECORDER',
          hint: 'transparent overlay titles (vp9 alpha) + export',
          file: 'hans-overlay-recorder.html',
        },
      }

      function normalizeTool(t) {
        const k = String(t || '').trim().toLowerCase()
        return TOOLS[k] ? k : 'video'
      }

      function getToolFromUrl() {
        try {
          const sp = new URLSearchParams(window.location.search)
          const t = sp.get('tool')
          if (t && TOOLS[String(t).toLowerCase()]) return String(t).toLowerCase()
        } catch (e) {
          // ignore
        }
        return 'video'
      }

      function setTool(t, opts = {}) {
        const k = normalizeTool(t)
        const conf = TOOLS[k]

        toolSelect.value = k
        toolName.textContent = conf.label
        toolHint.textContent = conf.hint

        // Always reload when switching tools so the UI is in a clean state.
        toolFrame.src = conf.file

        const updateUrl = opts.updateUrl !== false
        if (updateUrl) {
          try {
            const u = new URL(window.location.href)
            u.searchParams.set('tool', k)
            window.history.replaceState({}, '', u)
          } catch (e) {
            // ignore
          }
        }
      }

      toolSelect.addEventListener('change', () => setTool(toolSelect.value))

      window.addEventListener('keydown', (e) => {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')) return
        if (e.key === '1') setTool('video')
        if (e.key === '2') setTool('overlay')
      })

      setTool(getToolFromUrl(), { updateUrl: false })
    </script>
  </body>
</html>
