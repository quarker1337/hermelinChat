<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H.A.N.S. Text Overlay Recorder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a201f;color:#4dffa1;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;}
h1{font-size:14px;color:#2da565;margin-bottom:16px;letter-spacing:4px;}
.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;align-items:center;}
input,select{background:#0c0f0e;border:1px solid #2a3533;color:#e8f0ec;font-family:monospace;font-size:14px;padding:8px 12px;border-radius:2px;}
input:focus{outline:1px solid #4dffa1;border-color:#4dffa1;}
input::placeholder{color:#5a6f6a;}
button{background:transparent;border:1px solid #2a3533;color:#4dffa1;font-family:monospace;font-size:13px;padding:8px 18px;cursor:pointer;transition:all 0.2s;}
button:hover{background:#1a201f;border-color:#4dffa1;}
button:disabled{opacity:0.3;cursor:default;}
button.recording{border-color:#fb7185;color:#fb7185;animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.status{font-size:11px;color:#5a6f6a;margin-bottom:12px;min-height:16px;}
.canvas-wrap{position:relative;width:1280px;max-width:100%;}
canvas{width:100%;display:block;border:1px solid #2a3533;border-radius:4px;}
.checkerboard{background-image:repeating-conic-gradient(#1a201f 0% 25%, #111514 0% 50%);background-size:20px 20px;}
.info{margin-top:16px;font-size:11px;color:#5a6f6a;text-align:center;max-width:700px;line-height:1.6;}
</style>
</head>
<body>
<h1>H.A.N.S. TEXT OVERLAY RECORDER</h1>
<div class="row">
  <input id="mainText" type="text" placeholder="Main text" style="width:340px;" value="Multi-Tool Execution">
  <input id="subText" type="text" placeholder="Subtitle (optional)" style="width:280px;" value="parallel tool calls with live streaming">
</div>
<div class="row">
  <select id="posSelect"><option value="bottom-left">Bottom Left</option><option value="bottom-center">Bottom Center</option><option value="bottom-right">Bottom Right</option><option value="top-left">Top Left</option><option value="top-center">Top Center</option><option value="top-right">Top Right</option></select>
  <select id="resSelect"><option value="1280">1280x720</option><option value="1920" selected>1920x1080</option><option value="2560">2560x1440</option><option value="3840">3840x2160</option></select>
  <select id="durSelect"><option value="3000">3s hold</option><option value="4000" selected>4s hold</option><option value="5000">5s hold</option><option value="6000">6s hold</option></select>
</div>
<div class="row">
  <button id="btnPreview">PREVIEW</button>
  <button id="btnRecord">RECORD (transparent)</button>
  <button id="btnStop" disabled>STOP</button>
</div>
<div class="status" id="status">type text, then preview or record (Enter to quick-preview)</div>
<div class="canvas-wrap checkerboard"><canvas id="c"></canvas></div>
<div class="info">Records with transparent background (VP9 alpha). Import as an overlay into your editor.<br>Checkerboard = transparency preview.</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
const btnP=document.getElementById('btnPreview'),btnR=document.getElementById('btnRecord'),btnS=document.getElementById('btnStop');
const mainIn=document.getElementById('mainText'),subIn=document.getElementById('subText');
const posSel=document.getElementById('posSelect'),resSel=document.getElementById('resSelect'),durSel=document.getElementById('durSelect');
let W,H,animId,startTime,recording=false,mediaRec,chunks=[],running=false;
function setRes(){const bw=parseInt(resSel.value);cv.width=bw;cv.height=Math.round(bw*9/16);W=cv.width;H=cv.height;}
const MX={bg:'#0c0f0e',text:'#c8d8d3',textBright:'#e8f0ec',accent:'#4dffa1',a300:'#b7ffd6',a500:'#2da565',a600:'#248a53',a700:'#1a6b3f',cyan:'#22d3ee',info:'#60a5fa',muted:'#5a6f6a'};
function rand(a,b){return a+Math.random()*(b-a);}function randInt(a,b){return Math.floor(rand(a,b));}
function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgba(hex,a){const[r,g,b]=hx(hex);return`rgba(${r},${g},${b},${a})`;}
const scC='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?<>{}[]=/\\|~^`'+String.fromCharCode(...Array.from({length:20},(_,i)=>0x30A0+i));
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeIn(t){return t*t*t;}

function frame(t){
  const mainText=mainIn.value||'TEXT';const subText=subIn.value||'';const pos=posSel.value;
  const holdDur=parseInt(durSel.value);const animIn=800;const animOut=600;const totalDur=animIn+holdDur+animOut;
  ctx.clearRect(0,0,W,H);
  if(t>totalDur+100)return false;
  let phase,pt;
  if(t<animIn){phase='in';pt=t/animIn;}else if(t<animIn+holdDur){phase='hold';pt=(t-animIn)/holdDur;}else{phase='out';pt=(t-animIn-holdDur)/animOut;}
  const s=H/1080;const mainFs=Math.round(30*s);const subFs=Math.round(16*s);const margin=Math.round(60*s);const lineGap=Math.round(10*s);
  ctx.font=`700 ${mainFs}px monospace`;const mainW=ctx.measureText(mainText).width;
  ctx.font=`400 ${subFs}px monospace`;const subW=subText?ctx.measureText(subText).width:0;
  let ax,ay,align;
  if(pos.includes('left')){ax=margin;align='left';}else if(pos.includes('right')){ax=W-margin;align='right';}else{ax=W/2;align='center';}
  if(pos.includes('top'))ay=margin+mainFs;else ay=H-margin-(subText?subFs+lineGap:0);
  let vis,slideX,slideY,spread,scaleAmt;
  if(phase==='in'){const e=easeOut(pt);vis=Math.min(1,pt*1.8);slideX=(1-e)*30*s*(pos.includes('left')?-1:pos.includes('right')?1:0);slideY=(1-e)*8*s;spread=(1-e)*12*s;scaleAmt=0.92+e*0.08;}
  else if(phase==='hold'){vis=1;slideX=0;slideY=0;spread=0;scaleAmt=1;}
  else{const e=easeIn(pt);vis=Math.max(0,1-pt*1.5);slideX=e*20*s*(pos.includes('left')?-1:pos.includes('right')?1:0);slideY=e*5*s;spread=e*8*s;scaleAmt=1-e*0.05;}
  if(vis<0.005)return t<totalDur+100;
  const ox=ax+slideX,oy=ay+slideY;
  // Accent line
  const lineW=Math.max(mainW,subW)+20*s;let lineX;
  if(align==='left')lineX=ox;else if(align==='right')lineX=ox-lineW;else lineX=ox-lineW/2;
  const lineY=oy+6*s;let lineVis;
  if(phase==='in')lineVis=easeOut(Math.max(0,(pt-0.15)/0.85));else if(phase==='hold')lineVis=1;else lineVis=Math.max(0,1-easeIn(pt)*2);
  const aLW=lineW*lineVis;const lsx=align==='right'?lineX+lineW-aLW:align==='center'?lineX+(lineW-aLW)/2:lineX;
  ctx.fillStyle=rgba(MX.accent,vis*0.5*lineVis);ctx.fillRect(lsx,lineY,aLW,Math.round(1.5*s));
  ctx.fillStyle=rgba(MX.accent,vis*0.08*lineVis);ctx.fillRect(lsx,lineY-1*s,aLW,Math.round(4*s));
  // Scramble
  let dM=mainText,dS=subText;
  if(phase==='in'){const cr=pt*1.4;dM='';for(let i=0;i<mainText.length;i++){const r2=i/mainText.length;if(r2<cr-0.1)dM+=mainText[i];else if(mainText[i]===' ')dM+=' ';else if(r2<cr&&Math.random()>0.4)dM+=mainText[i];else dM+=scC[randInt(0,scC.length)];}
    if(subText){const sr=Math.max(0,pt-0.3)*2.5;dS='';for(let i=0;i<subText.length;i++){const r2=i/subText.length;if(r2<sr-0.1)dS+=subText[i];else if(subText[i]===' ')dS+=' ';else if(r2<sr&&Math.random()>0.4)dS+=subText[i];else dS+=scC[randInt(0,scC.length)];}}}
  if(phase==='out'&&pt>0.15){const sp=Math.min(1,(pt-0.15)/0.6);dM='';for(let i=0;i<mainText.length;i++)dM+=Math.random()>sp?mainText[i]:(mainText[i]===' '?' ':scC[randInt(0,scC.length)]);
    if(subText){dS='';for(let i=0;i<subText.length;i++)dS+=Math.random()>sp?subText[i]:(subText[i]===' '?' ':scC[randInt(0,scC.length)]);}}
  // Draw main
  ctx.save();ctx.translate(ox,oy);ctx.scale(scaleAmt,scaleAmt);
  ctx.font=`700 ${mainFs}px monospace`;ctx.textAlign=align;ctx.textBaseline='alphabetic';
  const cs=spread+0.5*s;
  if(cs>1){ctx.fillStyle=rgba(MX.cyan,vis*0.10*(cs/(12*s)));ctx.fillText(dM,cs*0.8,-cs*0.3);ctx.fillStyle=rgba(MX.info,vis*0.08*(cs/(12*s)));ctx.fillText(dM,-cs*0.6,cs*0.4);}
  ctx.fillStyle=rgba(MX.accent,vis*0.06);ctx.fillText(dM,rand(-1,1)*s,rand(-1,1)*s);
  ctx.fillStyle=rgba(MX.textBright,vis*0.95);ctx.fillText(dM,0,0);
  ctx.strokeStyle=rgba(MX.cyan,vis*0.03+vis*(phase==='in'?(1-pt)*0.08:0));ctx.lineWidth=1*s;ctx.strokeText(dM,0,0);
  // Subtitle
  if(subText){const subY2=lineGap+subFs+4*s;let sv=vis;if(phase==='in')sv=vis*easeOut(Math.max(0,(pt-0.25)/0.75));
    if(sv>0.01){ctx.font=`400 ${subFs}px monospace`;ctx.textAlign=align;ctx.fillStyle=rgba(MX.accent,sv*0.03);ctx.fillText(dS,rand(-0.5,0.5)*s,subY2+rand(-0.5,0.5)*s);ctx.fillStyle=rgba(MX.text,sv*0.65);ctx.fillText(dS,0,subY2);}}
  ctx.restore();
  // Glitch artifacts
  if(phase==='in'&&pt<0.6){const inten=(1-pt/0.6);for(let i=0;i<2;i++){if(Math.random()>0.5)continue;ctx.fillStyle=rgba(MX.accent,inten*0.08*vis);ctx.fillRect(lsx+rand(-30,30)*s,oy+rand(-mainFs*1.5,mainFs+30*s),rand(30,150)*s,rand(1,3)*s);}}
  if(phase==='out'&&pt>0.3){const inten=(pt-0.3)/0.7;for(let i=0;i<2;i++){if(Math.random()>0.4)continue;ctx.fillStyle=rgba(MX.accent,inten*0.06*vis);ctx.fillRect(lsx+rand(-30,30)*s,oy+rand(-mainFs*1.5,mainFs+30*s),rand(20,100)*s,rand(1,3)*s);}}
  if(phase==='hold'&&Math.random()>0.96){try{const gy=oy+rand(-mainFs,mainFs*0.5),gh=rand(2,5)*s,gw=rand(40,120)*s;const sl=ctx.getImageData(lsx,gy,gw,gh);ctx.putImageData(sl,lsx+rand(-4,4)*s,gy);}catch(e){}}
  return true;
}
function run(rec){if(running)return;if(!mainIn.value.trim()){statusEl.textContent='enter some text first';return;}running=true;setRes();btnP.disabled=true;btnR.disabled=true;btnS.disabled=!rec;
  if(rec){btnR.classList.add('recording');let mt='video/webm;codecs=vp9';if(!MediaRecorder.isTypeSupported(mt))mt='video/webm';const stream=cv.captureStream(60);mediaRec=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:12000000});chunks=[];mediaRec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};mediaRec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;const sn=mainIn.value.replace(/[^a-zA-Z0-9]/g,'_').slice(0,30).toLowerCase();a.download=`overlay_${sn}_${resSel.value}p.webm`;a.click();URL.revokeObjectURL(url);statusEl.textContent=`saved: overlay_${sn}.webm`;btnR.classList.remove('recording');};mediaRec.start();recording=true;statusEl.textContent='recording (transparent)...';}
  else statusEl.textContent='previewing...';
  startTime=null;function tick(ts){if(!startTime)startTime=ts;const t2=ts-startTime;const ok=frame(t2);if(ok&&running)animId=requestAnimationFrame(tick);else stop(false);}animId=requestAnimationFrame(tick);}
function stop(manual){running=false;cancelAnimationFrame(animId);if(recording){mediaRec.stop();recording=false;}else statusEl.textContent=manual?'stopped':'done — ready for next';btnP.disabled=false;btnR.disabled=false;btnS.disabled=true;btnR.classList.remove('recording');}
btnP.addEventListener('click',()=>run(false));btnR.addEventListener('click',()=>run(true));btnS.addEventListener('click',()=>stop(true));
mainIn.addEventListener('keydown',e=>{if(e.key==='Enter')run(false);});subIn.addEventListener('keydown',e=>{if(e.key==='Enter')run(false);});
setRes();ctx.clearRect(0,0,W,H);ctx.font='14px monospace';ctx.fillStyle=rgba(MX.accent,0.5);ctx.textAlign='center';ctx.fillText('TYPE TEXT AND HIT PREVIEW OR ENTER',W/2,H/2);
</script>
</body>
</html>
