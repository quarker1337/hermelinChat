<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hermelinChat › Strudel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --theme-bg: #0c0f0e;
    --theme-surface: #111514;
    --theme-elevated: #1a201f;
    --theme-border: #243230;
    --theme-muted: #5a7a72;
    --theme-text: #b8d4cb;
    --theme-text-bright: #e2f0ea;
    --theme-accent: #4dffa1;
    --theme-accent-soft: #b7ffd6;
    --theme-accent-muted: #2da565;
    --theme-accent-strong: #1a6b3f;
    --theme-success: #4dffa1;
    --theme-warning: #f0c040;
    --theme-danger: #ff7070;
    --theme-bg-deep: #0a0d0c;
    --theme-scrollbar: #2e4340;
    --theme-scrollbar-hover: #5a7a72;
    --theme-accent-surface: #0a2e1a;
    --theme-danger-surface: #2a101033;
    --theme-accent-glow: rgba(45, 165, 101, 0.27);
    --theme-accent-glow-strong: rgba(77, 255, 161, 0.53);
    --theme-success-glow: rgba(77, 255, 161, 0.27);
    --theme-warning-glow: rgba(240, 192, 64, 0.40);
    --theme-danger-glow: rgba(255, 112, 112, 0.40);
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--theme-bg); }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    color: var(--theme-text);
  }

  /* ── TOOLBAR ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--theme-surface);
    border-bottom: 1px solid var(--theme-border);
    flex-shrink: 0;
    z-index: 10;
  }
  .tbtn {
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--theme-border);
    background: var(--theme-elevated);
    color: var(--theme-text);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tbtn:hover { border-color: var(--theme-accent-muted); color: var(--theme-accent); background: var(--theme-accent-surface); }
  .tbtn:active { transform: scale(0.97); }
  .tbtn.on { background: var(--theme-accent-strong); border-color: var(--theme-accent-muted); color: var(--theme-text-bright); box-shadow: 0 0 10px var(--theme-accent-glow); }
  .tbtn.stopbtn:hover { border-color: var(--theme-danger); color: var(--theme-danger); background: var(--theme-danger-surface); }
  .tbtn.recbtn.recording { background: var(--theme-danger); border-color: var(--theme-danger); color: #fff; box-shadow: 0 0 12px var(--theme-danger-glow); animation: rec-pulse 1s ease-in-out infinite; }
  @keyframes rec-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
  .sep { width: 1px; height: 20px; background: var(--theme-border); margin: 0 4px; }
  .spacer { flex: 1; }
  .hint { font-size: 10px; color: var(--theme-muted); }

  /* ── CPS / BPM CONTROL ── */
  .tempo-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .tempo-wrap label {
    font-size: 9px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tempo-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 64px;
    height: 6px;
    border-radius: 3px;
    background: var(--theme-elevated);
    outline: none;
    cursor: pointer;
  }
  .tempo-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--theme-accent);
    border: 1px solid var(--theme-accent-muted);
    cursor: pointer;
  }
  .tempo-slider::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--theme-accent);
    border: 1px solid var(--theme-accent-muted);
    cursor: pointer;
  }
  .tempo-val {
    font-size: 10px;
    color: var(--theme-text);
    min-width: 52px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .tempo-val .bpm-num { color: var(--theme-text-bright); font-weight: 500; }

  /* ── VOLUME CONTROL ── */
  .vol-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .vol-label {
    font-size: 9px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 52px;
    height: 6px;
    border-radius: 3px;
    background: var(--theme-elevated);
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--theme-text);
    border: 1px solid var(--theme-muted);
    cursor: pointer;
  }
  .vol-slider::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--theme-text);
    border: 1px solid var(--theme-muted);
    cursor: pointer;
  }
  .vol-val {
    font-size: 10px;
    color: var(--theme-muted);
    min-width: 22px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── EQ PANEL ── */
  #eq-panel {
    display: none;
    background: var(--theme-surface);
    border-bottom: 1px solid var(--theme-border);
    padding: 8px 14px 6px;
    flex-shrink: 0;
    z-index: 9;
    flex-direction: column;
    gap: 6px;
  }
  #eq-panel.open { display: flex; }
  /* Top row: knobs + spectrum + reset */
  .eq-top-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eq-title {
    font-size: 9px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .eq-bands {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .eq-band {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: default;
  }
  .eq-knob-wrap {
    position: relative;
    width: 44px;
    height: 44px;
    cursor: grab;
  }
  .eq-knob-wrap:active { cursor: grabbing; }
  .eq-knob-wrap svg { display: block; }
  .eq-db {
    font-size: 9px;
    color: var(--theme-text);
    font-variant-numeric: tabular-nums;
    text-align: center;
    font-weight: 500;
    min-width: 36px;
  }
  .eq-db.boosted { color: var(--theme-accent); }
  .eq-db.cut { color: var(--theme-warning); }
  .eq-freq {
    font-size: 9px;
    color: var(--theme-text-bright);
    font-variant-numeric: tabular-nums;
  }
  .eq-label {
    font-size: 7px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .eq-sep {
    width: 1px;
    height: 52px;
    background: var(--theme-border);
    flex-shrink: 0;
  }
  /* EQ spectrum analyzer */
  .eq-spectrum {
    flex: 1;
    min-width: 120px;
    height: 56px;
    background: var(--theme-bg-deep);
    border: 1px solid var(--theme-border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .eq-spectrum canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .eq-reset {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--theme-border);
    background: var(--theme-elevated);
    color: var(--theme-muted);
    font-family: inherit;
    font-size: 9px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .eq-reset:hover {
    border-color: var(--theme-accent-muted);
    color: var(--theme-accent);
    background: var(--theme-accent-surface);
  }

  /* ── Record time display ── */
  .rec-time {
    font-size: 10px;
    color: var(--theme-danger);
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    margin-left: 2px;
  }

  /* ── Small icon button ── */
  .ibtn {
    padding: 4px 7px;
    border-radius: 4px;
    border: 1px solid var(--theme-border);
    background: var(--theme-elevated);
    color: var(--theme-muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .ibtn:hover { border-color: var(--theme-accent-muted); color: var(--theme-accent); }
  .ibtn.on { color: var(--theme-accent); border-color: var(--theme-accent-muted); background: var(--theme-accent-surface); }

  #statusDot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--theme-warning); box-shadow: 0 0 6px var(--theme-warning-glow);
    margin-right: 6px;
  }
  #statusDot.playing { background: var(--theme-success); box-shadow: 0 0 8px var(--theme-success-glow); }

  /* ── AUDIO METER ── */
  .meter-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    max-width: 420px;
    margin: 0 8px;
  }
  .meter-label {
    font-size: 9px;
    color: var(--theme-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .meter-track {
    flex: 1;
    height: 14px;
    background: var(--theme-bg-deep);
    border-radius: 3px;
    border: 1px solid var(--theme-elevated);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    gap: 1px;
    padding: 2px;
  }
  .meter-seg {
    flex: 1;
    border-radius: 1px;
    background: var(--theme-elevated);
    transition: background 0.06s;
  }
  .meter-seg.on-green { background: var(--theme-success); box-shadow: 0 0 3px var(--theme-success-glow); }
  .meter-seg.on-yellow { background: var(--theme-warning); box-shadow: 0 0 3px var(--theme-warning-glow); }
  .meter-seg.on-red { background: var(--theme-danger); box-shadow: 0 0 4px var(--theme-danger-glow); }
  .meter-db {
    font-size: 10px;
    color: var(--theme-muted);
    min-width: 48px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ── EDITOR CONTAINER ── */
  #editor-container {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── BOTTOM INFO PANEL ── */
  #bottom-panel {
    display: none;
    flex-shrink: 0;
    background: var(--theme-surface);
    border-top: 1px solid var(--theme-border);
    font-size: 11px;
    max-height: 160px;
    overflow: hidden;
  }
  #bottom-panel.open { display: flex; flex-direction: column; }
  #panel-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--theme-border);
    flex-shrink: 0;
  }
  .panel-tab {
    padding: 5px 14px;
    font-size: 10px;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--theme-muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .panel-tab:hover { color: var(--theme-text); }
  .panel-tab.active { color: var(--theme-accent); border-bottom-color: var(--theme-accent); }
  .panel-tab-close {
    margin-left: auto;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--theme-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .panel-tab-close:hover { color: var(--theme-danger); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--theme-scrollbar) var(--theme-surface);
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--theme-scrollbar); border-radius: 3px; }

  /* Console log entries */
  .log-entry { padding: 2px 0; border-bottom: 1px solid var(--theme-border); color: var(--theme-text); word-break: break-all; }
  .log-entry.error { color: var(--theme-danger); }
  .log-entry.warn { color: var(--theme-warning); }
  .log-entry .log-time { color: var(--theme-muted); font-size: 9px; margin-right: 6px; }

  /* Pattern info */
  .info-grid {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    padding: 4px 0;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 9px; color: var(--theme-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-value { font-size: 14px; color: var(--theme-text-bright); font-weight: 500; font-variant-numeric: tabular-nums; }

  /* ── CODEMIRROR THEME OVERRIDES ──
     Force CM internals to follow our --theme-* variables
     so bright skins don't break the editor appearance.
  */
  .cm-editor {
    background: var(--theme-bg) !important;
    color: var(--theme-text) !important;
  }
  .cm-editor .cm-content {
    color: var(--theme-text) !important;
    caret-color: var(--theme-accent) !important;
  }
  .cm-editor .cm-cursor, .cm-editor .cm-dropCursor {
    border-left-color: var(--theme-accent) !important;
  }
  .cm-editor .cm-gutters {
    background: var(--theme-surface) !important;
    color: var(--theme-muted) !important;
    border-right: 1px solid var(--theme-border) !important;
  }
  .cm-editor .cm-activeLineGutter {
    background: var(--theme-elevated) !important;
    color: var(--theme-text-bright) !important;
  }
  .cm-editor .cm-activeLine {
    background: var(--theme-elevated) !important;
  }
  .cm-editor .cm-selectionBackground,
  .cm-editor .cm-focused .cm-selectionBackground,
  ::selection {
    background: var(--theme-accent-surface) !important;
  }
  .cm-editor .cm-matchingBracket {
    background: var(--theme-accent-surface) !important;
    color: var(--theme-accent) !important;
    outline: 1px solid var(--theme-accent-muted);
  }
  .cm-editor .cm-searchMatch {
    background: var(--theme-warning-glow) !important;
  }
  .cm-editor .cm-tooltip {
    background: var(--theme-surface) !important;
    color: var(--theme-text) !important;
    border: 1px solid var(--theme-border) !important;
  }
  .cm-editor .cm-tooltip-autocomplete ul li[aria-selected] {
    background: var(--theme-accent-surface) !important;
    color: var(--theme-text-bright) !important;
  }
  .cm-editor .cm-panels {
    background: var(--theme-surface) !important;
    color: var(--theme-text) !important;
  }

  /* ── SYNTAX HIGHLIGHTING ──
     CM6 syntax tokens use generated scoped classes (ͼ1.ͼc etc.)
     that beat static CSS specificity. The JS function injectCMOverrides()
     reads CM's computed colors, classifies each token role, and injects
     a dynamic <style> with the correct theme colors.
     The static .cm-editor rules above serve as fallback for chrome elements.
  */

  /* ── Flash/highlight animation on eval ── */
  .cm-editor .cm-line.flash {
    background: var(--theme-accent-glow) !important;
  }

  /* Only touch cm-scroller overflow — nothing else */
  .cm-scroller {
    overflow: auto !important;
    scrollbar-width: thin;
    scrollbar-color: var(--theme-scrollbar) var(--theme-surface);
  }
  .cm-scroller::-webkit-scrollbar { width: 8px; height: 8px; }
  .cm-scroller::-webkit-scrollbar-track { background: var(--theme-surface); }
  .cm-scroller::-webkit-scrollbar-thumb { background: var(--theme-scrollbar); border-radius: 4px; min-height: 40px; }
  .cm-scroller::-webkit-scrollbar-thumb:hover { background: var(--theme-scrollbar-hover); }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span id="statusDot"></span>
    <button class="tbtn" id="btnPlay" onclick="doPlay()">▶ Play</button>
    <button class="tbtn stopbtn" id="btnStop" onclick="doStop()">■ Stop</button>
    <div class="sep"></div>
    <button class="tbtn recbtn" id="btnRec" onclick="toggleRecord()">⏺ Rec</button>
    <span class="rec-time" id="recTime"></span>
    <div class="sep"></div>
    <div class="tempo-wrap">
      <label>bpm</label>
      <input type="range" class="tempo-slider" id="tempoSlider" min="30" max="300" value="120" oninput="onTempoSlider(this.value)">
      <span class="tempo-val" id="tempoVal"><span class="bpm-num">120</span></span>
    </div>
    <div class="sep"></div>
    <div class="meter-wrap">
      <span class="meter-label">out</span>
      <div class="meter-track" id="meterTrack"></div>
      <span class="meter-db" id="meterDb">-∞ dB</span>
    </div>
    <div class="sep"></div>
    <div class="vol-wrap">
      <span class="vol-label">vol</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="onVolSlider(this.value)">
      <span class="vol-val" id="volVal">80</span>
    </div>
    <div class="sep"></div>
    <button class="ibtn" id="btnEq" onclick="toggleEq()" title="Equalizer">EQ</button>
    <button class="ibtn" id="btnPanel" onclick="togglePanel()" title="Info panel">☰</button>
  </div>

  <!-- ── EQ PANEL ── -->
  <div id="eq-panel">
    <div class="eq-top-row">
      <span class="eq-title">EQ</span>
      <div class="eq-bands" id="eqBands"></div>
      <div class="eq-sep"></div>
      <div class="eq-spectrum">
        <canvas id="spectrumCanvas"></canvas>
      </div>
      <button class="eq-reset" onclick="resetEq()">Reset</button>
    </div>
  </div>

  <div id="editor-container">
    <strudel-editor id="repl">
<!--
// hermelinChat × Strudel
// paste your pattern here, press ctrl+enter or ▶ Play
setcps(0.5)

s("bd sd")
-->
    </strudel-editor>
  </div>

  <div id="bottom-panel">
    <div id="panel-tabs">
      <button class="panel-tab active" onclick="switchTab('console')">Console</button>
      <button class="panel-tab" onclick="switchTab('info')">Info</button>
      <button class="panel-tab-close" onclick="togglePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelConsole">
      <div class="log-entry" style="color:var(--theme-muted);font-style:italic;">Waiting for eval…</div>
    </div>
    <div class="panel-body" id="panelInfo" style="display:none;">
      <div class="info-grid">
        <div class="info-item"><span class="info-label">BPM</span><span class="info-value" id="infoBpm">—</span></div>
        <div class="info-item"><span class="info-label">CPS</span><span class="info-value" id="infoCps">—</span></div>
        <div class="info-item"><span class="info-label">Cycle</span><span class="info-value" id="infoCycle">—</span></div>
        <div class="info-item"><span class="info-label">Lines</span><span class="info-value" id="infoLines">—</span></div>
        <div class="info-item"><span class="info-label">Status</span><span class="info-value" id="infoStatus">stopped</span></div>
      </div>
    </div>
  </div>
</div>

<script>
// Wait for the web component to fully init, then grab the API
let api = null;
let isPlaying = false;
let bridgeReadySent = false;

function emitHermesEvent(eventName, payload = {}, requestId = null) {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: 'hermes:artifact-event',
        channel: 'strudel',
        event: eventName,
        requestId,
        payload,
      }, '*');
    }
  } catch (e) {
    console.warn('[hermelinChat] bridge emit failed:', e);
  }
}

function currentCode() {
  try {
    return api?.editor?.state?.doc?.toString?.() ?? api?.code ?? '';
  } catch {
    return api?.code ?? '';
  }
}

function currentCodeSummary() {
  const code = currentCode();
  return {
    code_length: code.length,
    line_count: code === '' ? 0 : code.split(/\r?\n/).length,
  };
}

function currentCursor() {
  try {
    return Number(api?.getCursorLocation?.() ?? 0);
  } catch {
    return 0;
  }
}

function setPlayUi(playing) {
  isPlaying = !!playing;
  document.getElementById('btnPlay').classList.toggle('on', isPlaying);
  document.getElementById('statusDot').classList.toggle('playing', isPlaying);
}

function tryGetAPI() {
  const el = document.getElementById('repl');
  if (el && el.editor) {
    api = el.editor;
    console.log('[hermelinChat] StrudelMirror API ready:', Object.keys(api));
    if (!bridgeReadySent) {
      bridgeReadySent = true;
      emitHermesEvent('ready', {
        capabilities: [
          'get-code',
          'set-code',
          'append-code',
          'replace-range',
          'get-cursor',
          'set-cursor',
          'play',
          'stop',
          'get-audio-snapshot',
          'get-eq-state',
          'set-eq',
        ],
      });
      // CM is now rendered — re-inject theme overrides after a short delay
      // so syntax highlight spans exist for classification
      setTimeout(() => {
        if (typeof _lastThemeColors !== 'undefined' && _lastThemeColors) {
          const lum = relativeLuminance(_lastThemeColors.bg);
          injectCMOverrides(_lastThemeColors, lum > 0.35);
        }
      }, 500);
    }
    return true;
  }
  return false;
}

// Poll until ready
if (!tryGetAPI()) {
  const iv = setInterval(() => {
    if (tryGetAPI()) clearInterval(iv);
  }, 300);
}

function doPlay() {
  if (!api) { console.warn('Editor not ready'); return; }
  try {
    api.evaluate();
    setPlayUi(true);
    emitHermesEvent('playing', { playing: true });
  } catch(e) { console.error(e); }
}

function doStop() {
  if (!api) { console.warn('Editor not ready'); return; }
  try {
    api.stop();
  } catch(e) { console.error(e); }
  setPlayUi(false);
  emitHermesEvent('playing', { playing: false });
  updateInfoPanel();
}

// ── RECORDING ──
let mediaRecorder = null;
let recordedChunks = [];
let recStartTime = 0;
let recTimerInterval = null;
let recDest = null; // MediaStreamDestination — kept alive during recording

function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  try {
    const ctx = typeof getAudioContext === 'function' ? getAudioContext() : null;
    if (!ctx) { addLog('No audio context available', 'error'); return; }

    if (!analyser) {
      addLog('Audio meter not ready — try playing first', 'warn');
      return;
    }

    // Create a MediaStreamDestination and connect analyser to it
    // This doesn't interfere with the existing audio routing
    recDest = ctx.createMediaStreamDestination();
    analyser.connect(recDest);

    recordedChunks = [];
    mediaRecorder = new MediaRecorder(recDest.stream, {
      mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm'
    });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      clearInterval(recTimerInterval);
      document.getElementById('btnRec').classList.remove('recording');
      document.getElementById('recTime').textContent = '';

      // Disconnect rec destination (doesn't affect main audio path)
      try { analyser.disconnect(recDest); } catch(e) {}
      recDest = null;

      if (recordedChunks.length === 0) { addLog('Recording empty', 'warn'); return; }

      addLog('Converting to WAV…');

      try {
        // Decode webm blob to raw PCM via OfflineAudioContext
        const webmBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const arrayBuf = await webmBlob.arrayBuffer();
        const audioCtx = typeof getAudioContext === 'function' ? getAudioContext() : new AudioContext();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);

        const numChannels = decoded.numberOfChannels;
        const sampleRate = decoded.sampleRate;
        const length = decoded.length;

        // Interleave channels
        const interleaved = new Float32Array(length * numChannels);
        for (let i = 0; i < length; i++) {
          for (let ch = 0; ch < numChannels; ch++) {
            interleaved[i * numChannels + ch] = decoded.getChannelData(ch)[i];
          }
        }

        // Encode WAV
        const wavBlob = encodeWAV(interleaved, sampleRate, numChannels);
        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.href = url;
        a.download = `strudel-${dateStr}.wav`;
        a.click();
        URL.revokeObjectURL(url);

        const sizeMB = (wavBlob.size / (1024 * 1024)).toFixed(1);
        const durSec = (length / sampleRate).toFixed(1);
        addLog(`WAV saved: ${durSec}s, ${sizeMB} MB, ${sampleRate} Hz, ${numChannels}ch`);
      } catch (e) {
        console.error('WAV conversion failed:', e);
        addLog('WAV conversion failed, saving as webm instead…', 'warn');
        // Fallback: just save the webm
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.href = url;
        a.download = `strudel-${dateStr}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        addLog(`Webm fallback saved (${(blob.size / 1024).toFixed(1)} KB)`);
      }
    };

    mediaRecorder.start(100);
    recStartTime = Date.now();
    document.getElementById('btnRec').classList.add('recording');

    recTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('recTime').textContent = `${m}:${s}`;
    }, 500);

    addLog('Recording started…');
  } catch (e) {
    console.error(e);
    addLog('Record failed: ' + e.message, 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    addLog('Recording stopped, converting…');
  }
}

function encodeWAV(samples, sampleRate, numChannels) {
  const bitsPerSample = 16;
  const bytesPerSample = bitsPerSample / 8;
  const blockAlign = numChannels * bytesPerSample;
  const dataSize = samples.length * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    s = s < 0 ? s * 0x8000 : s * 0x7FFF;
    view.setInt16(offset, s | 0, true);
    offset += 2;
  }

  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

function onTempoSlider(bpm) {

  currentCps = cps;

// Sync slider from code if code contains setcps()
function syncTempoFromCode() {
  const code = currentCode();
  const m = code.match(/setcps\(\s*([\d.]+)\s*\)/);
  if (m) {
    const cps = parseFloat(m[1]);
    if (!isNaN(cps) && cps > 0) {
      currentCps = cps;
      const bpm = Math.round(cps * 60 * 4);
      const slider = document.getElementById('tempoSlider');

      slider.value = clampedBpm;
      document.getElementById('tempoVal').innerHTML = `<span class="bpm-num">${clampedBpm}</span>`;

// ── EQUALIZER ──
const EQ_BANDS = [
  { freq: 80,   type: 'lowshelf',  Q: 0.7, label: 'LOW'  },
  { freq: 500,  type: 'peaking',   Q: 1.0, label: 'LO-M' },
  { freq: 2000, type: 'peaking',   Q: 1.0, label: 'HI-M' },
  { freq: 6000, type: 'highshelf', Q: 0.7, label: 'HIGH'  },
];
let eqFilters = [];
let eqOpen = false;
let eqCurveRAF = null;
let spectrumAnalyser = null;
let spectrumData = null;
let spectrumRunning = false;

function disconnectNodeSafe(node) {
  if (!node) return;
  try { node.disconnect(); } catch(e) {}
}

function rebuildPostFxChain() {
  if (!audioCtxRef || !postFxInput || !masterGain || eqFilters.length === 0) return;
  disconnectNodeSafe(postFxInput);
  eqFilters.forEach(disconnectNodeSafe);
  disconnectNodeSafe(masterGain);

  postFxInput.connect(eqFilters[0]);
  for (let i = 0; i < eqFilters.length - 1; i++) {
    eqFilters[i].connect(eqFilters[i + 1]);
  }
  eqFilters[eqFilters.length - 1].connect(masterGain);
  masterGain.connect(audioCtxRef.destination);
  masterGain.connect(analyser);
  // Also feed spectrum analyser if it exists
  if (spectrumAnalyser) {
    try { masterGain.connect(spectrumAnalyser); } catch(e) {}
  }
  if (scopeAnalyser) {
    try { masterGain.connect(scopeAnalyser); } catch(e) {}
  }
}

function setupEqFilters(ctx = null) {
  if (eqFilters.length > 0) return;
  try {
    const resolvedCtx = ctx || (typeof getAudioContext === 'function' ? getAudioContext() : null);
    if (!resolvedCtx) return;

    eqFilters = EQ_BANDS.map(band => {
      const f = resolvedCtx.createBiquadFilter();
      f.type = band.type;
      f.frequency.value = band.freq;
      f.Q.value = band.Q;
      f.gain.value = 0;
      return f;
    });

    if (postFxInput && masterGain && analyser) rebuildPostFxChain();

    console.log('[hermelinChat] EQ filters ready');
  } catch(e) {
    console.warn('[hermelinChat] EQ setup failed:', e);
  }
}

function toggleEq() {

  document.getElementById('eq-panel').classList.toggle('open', eqOpen);
  document.getElementById('btnEq').classList.toggle('on', eqOpen);
  if (eqOpen) {
    setupEqFilters();
    buildEqKnobs();
    startSpectrum();
  } else {
    stopSpectrum();
  }
  setTimeout(fixEditorScroll, 50);
}

// ── EQ KNOB RENDERING ──
const eqKnobValues = [0, 0, 0, 0]; // current dB per band
const EQ_KNOB_MIN = -12;
const EQ_KNOB_MAX = 12;
const EQ_KNOB_ARC_START = 225; // degrees, rotated so 0dB = top
const EQ_KNOB_ARC_END = 495;
const EQ_KNOB_ARC_RANGE = 270; // total sweep

function buildEqKnobs() {
  const container = document.getElementById('eqBands');
  if (container.children.length > 0) return; // already built

  EQ_BANDS.forEach((band, i) => {
    const bandEl = document.createElement('div');
    bandEl.className = 'eq-band';
    bandEl.dataset.band = i;

    const freqStr = band.freq >= 1000 ? (band.freq / 1000) + ' kHz' : band.freq + ' Hz';

    // Build tick marks SVG — ticks every 1 dB from -12 to +12 (25 ticks)
    // Longer/brighter at 0, ±6, ±12
    const cx = 22, cy = 22, arcStart = 225;
    let ticksSvg = '';
    const tickCount = 25; // -12 to +12 inclusive
    for (let t = 0; t < tickCount; t++) {
      const dbVal = EQ_KNOB_MIN + t * (EQ_KNOB_MAX - EQ_KNOB_MIN) / (tickCount - 1);
      const norm = t / (tickCount - 1);
      const angle = arcStart + norm * EQ_KNOB_ARC_RANGE;
      const rad = degToRad(angle - 90);

      const isMajor = Math.abs(dbVal) < 0.01 || Math.abs(Math.abs(dbVal) - 6) < 0.01 || Math.abs(Math.abs(dbVal) - 12) < 0.01;
      const isCenter = Math.abs(dbVal) < 0.01;

      const outerR = 20.5;
      const innerR = isMajor ? 16.5 : 17.8;
      const x1 = cx + innerR * Math.cos(rad);
      const y1 = cy + innerR * Math.sin(rad);
      const x2 = cx + outerR * Math.cos(rad);
      const y2 = cy + outerR * Math.sin(rad);

      const sw = isCenter ? 1.5 : isMajor ? 1 : 0.5;
      const color = isCenter ? 'var(--theme-text-bright)' : 'var(--theme-border)';

      ticksSvg += `<line class="knob-tick" data-db="${dbVal.toFixed(1)}" x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
    }

    bandEl.innerHTML = `
      <span class="eq-db" id="eqDb${i}">0 dB</span>
      <div class="eq-knob-wrap" id="eqKnob${i}">
        <svg viewBox="0 0 44 44" width="44" height="44">
          <!-- track arc (background) -->
          <path class="knob-track" d="" fill="none" stroke="var(--theme-elevated)" stroke-width="3" stroke-linecap="round"/>
          <!-- tick marks -->
          <g class="knob-ticks">${ticksSvg}</g>
          <!-- value arc -->
          <path class="knob-value" d="" fill="none" stroke="var(--theme-accent-muted)" stroke-width="3" stroke-linecap="round"/>
          <!-- knob body -->
          <circle cx="22" cy="22" r="13" fill="var(--theme-elevated)" stroke="var(--theme-border)" stroke-width="1"/>
          <!-- indicator line -->
          <line class="knob-indicator" x1="22" y1="22" x2="22" y2="12" stroke="var(--theme-text-bright)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="eq-freq">${freqStr}</span>
      <span class="eq-label">${band.label}</span>
    `;
    container.appendChild(bandEl);
    renderKnob(i, 0);
    setupKnobDrag(i);
  });
}

function degToRad(d) { return d * Math.PI / 180; }

function describeArc(cx, cy, r, startAngle, endAngle) {
  const s = degToRad(startAngle - 90);
  const e = degToRad(endAngle - 90);
  const x1 = cx + r * Math.cos(s);
  const y1 = cy + r * Math.sin(s);
  const x2 = cx + r * Math.cos(e);
  const y2 = cy + r * Math.sin(e);
  const sweep = endAngle - startAngle;
  const largeArc = Math.abs(sweep) > 180 ? 1 : 0;
  const sweepFlag = sweep > 0 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweepFlag} ${x2} ${y2}`;
}

function renderKnob(band, dbVal) {
  const wrap = document.getElementById('eqKnob' + band);
  if (!wrap) return;
  const svg = wrap.querySelector('svg');
  const trackPath = svg.querySelector('.knob-track');
  const valuePath = svg.querySelector('.knob-value');
  const indicator = svg.querySelector('.knob-indicator');
  const body = svg.querySelector('circle');
  const ticks = svg.querySelectorAll('.knob-tick');

  const cx = 22, cy = 22, r = 18;
  const arcStart = 225;
  const arcEnd = 495;
  trackPath.setAttribute('d', describeArc(cx, cy, r, arcStart, arcEnd));

  // Value arc from center (0dB) to current
  const norm = (dbVal - EQ_KNOB_MIN) / (EQ_KNOB_MAX - EQ_KNOB_MIN);
  const centerNorm = 0.5;
  const currentAngle = arcStart + norm * EQ_KNOB_ARC_RANGE;
  const centerAngle = arcStart + centerNorm * EQ_KNOB_ARC_RANGE;

  if (Math.abs(dbVal) > 0.01) {
    const vStart = Math.min(centerAngle, currentAngle);
    const vEnd = Math.max(centerAngle, currentAngle);
    valuePath.setAttribute('d', describeArc(cx, cy, r, vStart, vEnd));
    valuePath.setAttribute('stroke', dbVal > 0 ? 'var(--theme-accent)' : 'var(--theme-warning)');
  } else {
    valuePath.setAttribute('d', '');
  }

  // Rotate indicator line
  const indR1 = 5;
  const indR2 = 11.5;
  const rad = degToRad(currentAngle - 90);
  indicator.setAttribute('x1', (cx + indR1 * Math.cos(rad)).toFixed(2));
  indicator.setAttribute('y1', (cy + indR1 * Math.sin(rad)).toFixed(2));
  indicator.setAttribute('x2', (cx + indR2 * Math.cos(rad)).toFixed(2));
  indicator.setAttribute('y2', (cy + indR2 * Math.sin(rad)).toFixed(2));

  // Light up ticks that are "passed" by the value
  const isBoost = dbVal > 0.01;
  const isCut = dbVal < -0.01;
  const activeColor = isBoost ? 'var(--theme-accent)' : 'var(--theme-warning)';

  ticks.forEach(tick => {
    const tickDb = parseFloat(tick.dataset.db);
    const isCenter = Math.abs(tickDb) < 0.01;
    const isMajor = isCenter || Math.abs(Math.abs(tickDb) - 6) < 0.01 || Math.abs(Math.abs(tickDb) - 12) < 0.01;

    let lit = false;
    if (isBoost && tickDb > 0.01 && tickDb <= dbVal + 0.01) lit = true;
    if (isCut && tickDb < -0.01 && tickDb >= dbVal - 0.01) lit = true;

    if (lit) {
      tick.setAttribute('stroke', activeColor);
      tick.setAttribute('stroke-width', isMajor ? 1.5 : 1);
      tick.setAttribute('opacity', '1');
    } else if (isCenter) {
      tick.setAttribute('stroke', 'var(--theme-text-bright)');
      tick.setAttribute('stroke-width', '1.5');
      tick.setAttribute('opacity', '1');
    } else {
      tick.setAttribute('stroke', isMajor ? 'var(--theme-muted)' : 'var(--theme-border)');
      tick.setAttribute('stroke-width', isMajor ? 1 : 0.5);
      tick.setAttribute('opacity', isMajor ? '0.7' : '0.4');
    }
  });

  // Knob body glow on active
  if (Math.abs(dbVal) > 0.01) {
    body.setAttribute('stroke', 'var(--theme-accent-muted)');
    indicator.setAttribute('stroke', isBoost ? 'var(--theme-accent)' : 'var(--theme-warning)');
  } else {
    body.setAttribute('stroke', 'var(--theme-border)');
    indicator.setAttribute('stroke', 'var(--theme-text-bright)');
  }
}

function setupKnobDrag(band) {
  const wrap = document.getElementById('eqKnob' + band);
  if (!wrap) return;

  let dragging = false;
  let startY = 0;
  let startVal = 0;

  function onPointerDown(e) {
    e.preventDefault();
    dragging = true;
    startY = e.clientY;
    startVal = eqKnobValues[band];
    wrap.setPointerCapture(e.pointerId);
  }

  function onPointerMove(e) {
    if (!dragging) return;
    const dy = startY - e.clientY; // up = positive
    const sensitivity = e.shiftKey ? 0.05 : 0.15; // finer with shift
    let newVal = startVal + dy * sensitivity;
    // Snap to 0.5 steps
    newVal = Math.round(newVal * 2) / 2;
    newVal = Math.max(EQ_KNOB_MIN, Math.min(EQ_KNOB_MAX, newVal));
    setEqBand(band, newVal);
  }

  function onPointerUp(e) {
    if (!dragging) return;
    dragging = false;
    wrap.releasePointerCapture(e.pointerId);
  }

  wrap.addEventListener('pointerdown', onPointerDown);
  wrap.addEventListener('pointermove', onPointerMove);
  wrap.addEventListener('pointerup', onPointerUp);
  wrap.addEventListener('pointercancel', onPointerUp);

  // Double-click to reset
  wrap.addEventListener('dblclick', () => {
    setEqBand(band, 0);
  });

  // Mouse wheel
  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const step = e.shiftKey ? 0.5 : 1;
    const dir = e.deltaY < 0 ? 1 : -1;
    let newVal = eqKnobValues[band] + dir * step;
    newVal = Math.round(newVal * 2) / 2;
    newVal = Math.max(EQ_KNOB_MIN, Math.min(EQ_KNOB_MAX, newVal));
    setEqBand(band, newVal);
  }, { passive: false });
}

function setEqBand(band, val) {
  eqKnobValues[band] = val;
  renderKnob(band, val);

  const dbEl = document.getElementById('eqDb' + band);
  const sign = val > 0 ? '+' : '';
  dbEl.textContent = `${sign}${val.toFixed(val % 1 === 0 ? 0 : 1)} dB`;
  dbEl.className = 'eq-db' + (val > 0 ? ' boosted' : val < 0 ? ' cut' : '');

  if (eqFilters[band]) {
    eqFilters[band].gain.value = val;
  }
  drawEqCurve();
}

function onEqSlider(band, val) {
  // Legacy compat — redirect to knob system
  setEqBand(band, Number(val));
}

function resetEq() {
  for (let i = 0; i < EQ_BANDS.length; i++) {
    setEqBand(i, 0);
  }
}

// ── SPECTRUM ANALYZER ──

function ensureSpectrumAnalyser() {
  if (spectrumAnalyser) return true;
  try {
    const ctx = audioCtxRef || (typeof getAudioContext === 'function' ? getAudioContext() : null);
    if (!ctx) return false;
    spectrumAnalyser = ctx.createAnalyser();
    spectrumAnalyser.fftSize = 1024;
    spectrumAnalyser.smoothingTimeConstant = 0.75;
    spectrumData = new Float32Array(spectrumAnalyser.frequencyBinCount);
    // Tap it off the masterGain (post-EQ signal)
    if (masterGain) {
      masterGain.connect(spectrumAnalyser);
    }
    return true;
  } catch(e) {
    console.warn('[hermelinChat] Spectrum analyser setup failed:', e);
    return false;
  }
}

// Bar count and frequency band mapping — dynamic based on canvas width
const SPECTRUM_BAR_TARGET_W = 8; // target bar width in CSS px, bands scale to fill
// Map bands to log-spaced frequency ranges (20Hz – 20kHz)
function getSpectrumBandRanges(numBands, sampleRate, binCount) {
  const minF = 30, maxF = Math.min(18000, sampleRate / 2);
  const bands = [];
  for (let i = 0; i < numBands; i++) {
    const f0 = minF * Math.pow(maxF / minF, i / numBands);
    const f1 = minF * Math.pow(maxF / minF, (i + 1) / numBands);
    const bin0 = Math.max(0, Math.floor(f0 / (sampleRate / 2) * binCount));
    const bin1 = Math.min(binCount - 1, Math.ceil(f1 / (sampleRate / 2) * binCount));
    bands.push({ f0, f1, bin0, bin1 });
  }
  return bands;
}

let spectrumPeaks = new Float32Array(128);
let spectrumSmoothed = new Float32Array(128);
let lastSpectrumBands = 0;

function drawSpectrum() {
  if (!eqOpen) { spectrumRunning = false; return; }
  requestAnimationFrame(drawSpectrum);

  const canvas = document.getElementById('spectrumCanvas');
  if (!canvas) return;

  // Size canvas to actual pixel dimensions
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.round(rect.width * dpr);
  const h = Math.round(rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  // Get theme colors
  const cs = getComputedStyle(document.documentElement);
  const accentHex = cs.getPropertyValue('--theme-accent').trim() || '#4dffa1';
  const elevatedHex = cs.getPropertyValue('--theme-elevated').trim() || '#1a201f';
  const mutedHex = cs.getPropertyValue('--theme-muted').trim() || '#5a7a72';

  // Calculate number of bands to fill width
  const gapPx = 1.5 * dpr;
  const numBands = Math.max(8, Math.floor(w / (SPECTRUM_BAR_TARGET_W * dpr + gapPx)));
  const barW = (w - (numBands - 1) * gapPx) / numBands;

  // Resize smoothing arrays if band count changed
  if (numBands !== lastSpectrumBands) {
    spectrumPeaks = new Float32Array(numBands);
    spectrumSmoothed = new Float32Array(numBands);
    lastSpectrumBands = numBands;
  }

  if (!spectrumAnalyser || !spectrumData) {
    // Draw empty state — dim bars
    for (let i = 0; i < numBands; i++) {
      const x = i * (barW + gapPx);
      ctx.fillStyle = elevatedHex;
      ctx.fillRect(x, h * 0.85, barW, h * 0.15);
    }
    return;
  }

  spectrumAnalyser.getFloatFrequencyData(spectrumData);

  const sampleRate = spectrumAnalyser.context.sampleRate;
  const binCount = spectrumAnalyser.frequencyBinCount;
  const bands = getSpectrumBandRanges(numBands, sampleRate, binCount);

  const segH = Math.max(1, Math.round(2 * dpr));
  const segGap = Math.max(1, Math.round(1.2 * dpr));
  const maxSegs = Math.floor(h / (segH + segGap));
  const minDb = -70, maxDb = -5;

  // Parse accent color for gradient
  const [ar, ag, ab] = hexToRgb(accentHex);

  for (let i = 0; i < numBands; i++) {
    const band = bands[i];
    if (!band) continue;

    // Average dB in this band's bin range
    let sum = 0, count = 0;
    for (let b = band.bin0; b <= band.bin1; b++) {
      if (b < spectrumData.length) {
        sum += spectrumData[b];
        count++;
      }
    }
    const avgDb = count > 0 ? sum / count : -100;

    // Normalize 0..1
    const raw = Math.max(0, Math.min(1, (avgDb - minDb) / (maxDb - minDb)));

    // Smooth
    spectrumSmoothed[i] += (raw - spectrumSmoothed[i]) * 0.35;
    const val = spectrumSmoothed[i];

    // Peak hold with decay
    if (val > spectrumPeaks[i]) spectrumPeaks[i] = val;
    else spectrumPeaks[i] = Math.max(0, spectrumPeaks[i] - 0.012);

    const litSegs = Math.round(val * maxSegs);
    const peakSeg = Math.round(spectrumPeaks[i] * maxSegs);
    const x = i * (barW + gapPx);

    // Draw segments bottom to top
    for (let s = 0; s < maxSegs; s++) {
      const y = h - (s + 1) * (segH + segGap);
      if (s < litSegs) {
        const ratio = s / maxSegs;
        let r, g, b;
        if (ratio < 0.6) {
          const t = ratio / 0.6;
          r = ar + Math.round((220 - ar) * t * 0.3);
          g = ag;
          b = ab - Math.round(ab * t * 0.5);
        } else if (ratio < 0.82) {
          const t = (ratio - 0.6) / 0.22;
          r = Math.round(ar + (240 - ar) * t);
          g = Math.round(ag + (192 - ag) * t * 0.5);
          b = Math.round(ab * (1 - t));
        } else {
          r = 255;
          g = Math.round(112 + (0 - 112) * ((ratio - 0.82) / 0.18));
          b = Math.round(70 * (1 - (ratio - 0.82) / 0.18));
        }
        const alpha = 0.7 + 0.3 * ratio;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      } else if (s === peakSeg && peakSeg > 0) {
        ctx.fillStyle = mutedHex;
      } else {
        ctx.fillStyle = `rgba(${parseInt(elevatedHex.slice(1,3),16)},${parseInt(elevatedHex.slice(3,5),16)},${parseInt(elevatedHex.slice(5,7),16)},0.35)`;
      }
      ctx.fillRect(x, y, barW, segH);
    }
  }
}

// ── SCROLLING WAVEFORM ──
let scopeAnalyser = null;
let scopeData = null;
const WAVEFORM_COLS = 600; // number of columns in the scrolling buffer
let waveformBuffer = []; // each entry: { peak, rms } for one time slice
let waveformPlayhead = 0;

function ensureScopeAnalyser() {
  if (scopeAnalyser) return true;
  try {
    const ctx = audioCtxRef || (typeof getAudioContext === 'function' ? getAudioContext() : null);
    if (!ctx) return false;
    scopeAnalyser = ctx.createAnalyser();
    scopeAnalyser.fftSize = 1024;
    scopeAnalyser.smoothingTimeConstant = 0.3;
    scopeData = new Float32Array(scopeAnalyser.fftSize);
    if (masterGain) {
      masterGain.connect(scopeAnalyser);
    }
    return true;
  } catch(e) {
    console.warn('[hermelinChat] Scope analyser setup failed:', e);
    return false;
  }
}

function captureWaveformSlice() {
  if (!scopeAnalyser || !scopeData) return;
  scopeAnalyser.getFloatTimeDomainData(scopeData);

  let peak = 0, sumSq = 0;
  for (let i = 0; i < scopeData.length; i++) {
    const v = Math.abs(scopeData[i]);
    if (v > peak) peak = v;
    sumSq += scopeData[i] * scopeData[i];
  }
  const rms = Math.sqrt(sumSq / scopeData.length);

  waveformBuffer.push({ peak: Math.min(1, peak), rms: Math.min(1, rms) });
  if (waveformBuffer.length > WAVEFORM_COLS) {
    waveformBuffer.shift();
  }
}

function drawWaveform() {
  const canvas = document.getElementById('scopeCanvas');
  if (!canvas) return;

  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.round(rect.width * dpr);
  const h = Math.round(rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const cs = getComputedStyle(document.documentElement);
  const accentHex = cs.getPropertyValue('--theme-accent').trim() || '#4dffa1';
  const elevatedHex = cs.getPropertyValue('--theme-elevated').trim() || '#1a201f';
  const [ar, ag, ab] = hexToRgb(accentHex);

  // Center line
  ctx.strokeStyle = elevatedHex;
  ctx.lineWidth = dpr;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  const bufLen = waveformBuffer.length;
  if (bufLen === 0) return;

  // How many columns to draw — map buffer onto canvas width
  const colW = w / WAVEFORM_COLS;

  // Draw from right (newest) to left (oldest)
  for (let i = 0; i < bufLen; i++) {
    const slice = waveformBuffer[i];
    // Position: rightmost = newest
    const x = w - (bufLen - i) * colW;
    if (x + colW < 0) continue;

    const cy = h / 2;

    // RMS bar (filled, brighter)
    const rmsH = slice.rms * h * 0.9;
    ctx.fillStyle = `rgba(${ar},${ag},${ab},0.55)`;
    ctx.fillRect(x, cy - rmsH / 2, Math.max(1, colW - 0.5 * dpr), rmsH);

    // Peak bar (taller, dimmer)
    const peakH = slice.peak * h * 0.95;
    ctx.fillStyle = `rgba(${ar},${ag},${ab},0.2)`;
    ctx.fillRect(x, cy - peakH / 2, Math.max(1, colW - 0.5 * dpr), peakH);
  }

  // Playhead line at right edge
  ctx.strokeStyle = accentHex;
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath();
  ctx.moveTo(w - 1, 0);
  ctx.lineTo(w - 1, h);
  ctx.stroke();
}

function startSpectrum() {
  if (spectrumRunning) return;

// ── CONSOLE LOG ──
const MAX_LOG_ENTRIES = 100;

function addLog(msg, level = 'info') {
  const container = document.getElementById('panelConsole');
  // Remove the "Waiting" placeholder if it's there
  const placeholder = container.querySelector('[style*="italic"]');
  if (placeholder) placeholder.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry' + (level === 'error' ? ' error' : level === 'warn' ? ' warn' : '');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  entry.innerHTML = `<span class="log-time">${ts}</span>${escapeHtml(String(msg))}`;
  container.appendChild(entry);

  // Trim old entries
  while (container.children.length > MAX_LOG_ENTRIES) {
    container.removeChild(container.firstChild);
  }

  // Auto-scroll
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Intercept console.error/warn to capture eval errors
const _origError = console.error;
const _origWarn = console.warn;
console.error = function(...args) {
  _origError.apply(console, args);
  addLog(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '), 'error');
};
console.warn = function(...args) {
  _origWarn.apply(console, args);
  // Only capture strudel-related warnings, not our own
  const msg = args.join(' ');
  if (!msg.includes('[hermelinChat]')) {
    addLog(msg, 'warn');
  }
};

// Also catch global errors (eval failures etc.)
window.addEventListener('error', (e) => {
  addLog(`${e.message} (${e.filename}:${e.lineno})`, 'error');
});
window.addEventListener('unhandledrejection', (e) => {
  addLog(`Unhandled: ${e.reason}`, 'error');
});

// ── AUDIO TELEMETRY ──
// Captures a spectral + level snapshot for the AI agent

function captureAudioSnapshot() {
  const result = {
    timestamp: Date.now(),
    playing: isPlaying,
    bpm: parseInt(document.getElementById('tempoSlider')?.value || '120'),
    volume: parseInt(document.getElementById('volSlider')?.value || '80'),
    eq: getEqState(),
    spectrum: null,
    levels: null,
  };

  // Spectrum data — average energy in musical frequency ranges
  if (spectrumAnalyser && spectrumData) {
    try {
      spectrumAnalyser.getFloatFrequencyData(spectrumData);
      const sr = spectrumAnalyser.context.sampleRate;
      const binCount = spectrumAnalyser.frequencyBinCount;

      // Musical ranges in Hz
      const ranges = [
        { name: 'sub',       lo: 20,    hi: 60    },
        { name: 'bass',      lo: 60,    hi: 250   },
        { name: 'low_mid',   lo: 250,   hi: 500   },
        { name: 'mid',       lo: 500,   hi: 2000  },
        { name: 'upper_mid', lo: 2000,  hi: 4000  },
        { name: 'presence',  lo: 4000,  hi: 6000  },
        { name: 'brilliance',lo: 6000,  hi: 12000 },
        { name: 'air',       lo: 12000, hi: 20000 },
      ];

      const spectrum = {};
      for (const range of ranges) {
        const bin0 = Math.max(0, Math.floor(range.lo / (sr / 2) * binCount));
        const bin1 = Math.min(binCount - 1, Math.ceil(range.hi / (sr / 2) * binCount));
        let sum = 0, count = 0, peak = -Infinity;
        for (let b = bin0; b <= bin1; b++) {
          const val = spectrumData[b];
          sum += val;
          if (val > peak) peak = val;
          count++;
        }
        spectrum[range.name] = {
          avg_db: count > 0 ? Math.round((sum / count) * 10) / 10 : -100,
          peak_db: Math.round(peak * 10) / 10,
        };
      }
      result.spectrum = spectrum;
    } catch(e) {
      result.spectrum = null;
    }
  }

  // Overall peak/RMS from the meter analyser
  if (analyser && analyserData) {
    try {
      analyser.getFloatTimeDomainData(analyserData);
      let peak = 0, sumSq = 0;
      for (let i = 0; i < analyserData.length; i++) {
        const v = Math.abs(analyserData[i]);
        if (v > peak) peak = v;
        sumSq += analyserData[i] * analyserData[i];
      }
      const rms = Math.sqrt(sumSq / analyserData.length);
      const peakDb = peak > 0.0001 ? 20 * Math.log10(peak) : -100;
      const rmsDb = rms > 0.0001 ? 20 * Math.log10(rms) : -100;
      result.levels = {
        peak_db: Math.round(peakDb * 10) / 10,
        rms_db: Math.round(rmsDb * 10) / 10,
        peak_linear: Math.round(peak * 1000) / 1000,
        headroom_db: Math.round(-peakDb * 10) / 10,
      };
    } catch(e) {
      result.levels = null;
    }
  }

  return result;
}

function getEqState() {
  return {
    bands: EQ_BANDS.map((band, i) => ({
      index: i,
      freq: band.freq,
      type: band.type,
      label: band.label,
      gain_db: eqKnobValues[i] || 0,
    })),
    any_active: eqKnobValues.some(v => Math.abs(v) > 0.01),
  };
}

function handleHermesCommand(message) {
  if (!api) {
    emitHermesEvent('error', { message: 'Editor not ready' }, message.requestId || null);
    return;
  }

  const command = String(message.command || '').trim();
  const requestId = message.requestId || null;
  const payload = message.payload && typeof message.payload === 'object' ? message.payload : {};

  try {
    switch (command) {
      case 'get-code': {
        const code = currentCode();
        emitHermesEvent('code', { code, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'set-code': {
        api.setCode(String(payload.code ?? ''));
        emitHermesEvent('ack', { action: command, ok: true, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'append-code': {
        api.appendCode(String(payload.text ?? ''));
        emitHermesEvent('ack', { action: command, ok: true, inserted_length: String(payload.text ?? '').length, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'replace-range': {
        const text = String(payload.text ?? '');
        const full = currentCode();
        const from = Math.max(0, Math.min(full.length, Number(payload.from ?? 0)));
        const to = Math.max(from, Math.min(full.length, Number(payload.to ?? from)));
        api.editor.dispatch({ changes: { from, to, insert: text } });
        emitHermesEvent('ack', { action: command, ok: true, from, to, inserted_length: text.length, ...currentCodeSummary() }, requestId);
        return;
      }
      case 'get-cursor':
        emitHermesEvent('cursor', { position: currentCursor() }, requestId);
        return;
      case 'set-cursor': {
        const position = Math.max(0, Number(payload.position ?? 0));
        api.setCursorLocation(position);
        emitHermesEvent('ack', { action: command, ok: true, position: currentCursor() }, requestId);
        return;
      }
      case 'play':
        doPlay();
        emitHermesEvent('ack', { action: command, ok: true, playing: true }, requestId);
        return;
      case 'stop':
        doStop();
        emitHermesEvent('ack', { action: command, ok: true, playing: false }, requestId);
        return;

      case 'get-audio-snapshot': {
        const snapshot = captureAudioSnapshot();
        emitHermesEvent('audio-snapshot', snapshot, requestId);
        return;
      }

      case 'get-eq-state': {
        const eqState = getEqState();
        emitHermesEvent('eq-state', eqState, requestId);
        return;
      }

      case 'set-eq': {
        // payload: { bands: [{ band: 0, gain: 3.5 }, ...] }
        if (Array.isArray(payload.bands)) {
          for (const b of payload.bands) {
            if (typeof b.band === 'number' && typeof b.gain === 'number') {
              const idx = Math.max(0, Math.min(EQ_BANDS.length - 1, b.band));
              const gain = Math.max(EQ_KNOB_MIN, Math.min(EQ_KNOB_MAX, b.gain));
              setEqBand(idx, gain);
            }
          }
        }
        emitHermesEvent('ack', { action: command, ok: true, eq: getEqState() }, requestId);
        return;
      }

      default:
        emitHermesEvent('error', { message: `Unknown command: ${command}` }, requestId);
    }
  } catch (err) {
    console.error(err);
    emitHermesEvent('error', { message: err?.message || String(err), command }, requestId);
  }
}

const THEME_DEFAULTS = Object.freeze({
  bg: '#0c0f0e',
  surface: '#111514',
  elevated: '#1a201f',
  border: '#243230',
  muted: '#5a7a72',
  text: '#b8d4cb',
  textBright: '#e2f0ea',
  accent: '#4dffa1',
  accentSoft: '#b7ffd6',
  accentMuted: '#2da565',
  accentStrong: '#1a6b3f',
  success: '#4dffa1',
  warning: '#f0c040',
  danger: '#ff7070',
});

function hexToRgb(hex) {
  const raw = String(hex || '').trim().replace(/^#/, '');
  if (!raw) return [128, 128, 128];
  const normalized = raw.length === 3 ? raw.split('').map((ch) => ch + ch).join('') : raw.slice(0, 6);
  if (normalized.length !== 6) return [128, 128, 128];
  const int = Number.parseInt(normalized, 16);
  if (Number.isNaN(int)) return [128, 128, 128];
  return [(int >> 16) & 255, (int >> 8) & 255, int & 255];
}

function relativeLuminance(hex) {
  const [r, g, b] = hexToRgb(hex).map(c => {
    const s = c / 255;
    return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function darkenHex(hex, amount) {
  // amount 0..1, where 0 = no change, 1 = black
  const [r, g, b] = hexToRgb(hex);
  const f = 1 - amount;
  const dr = Math.round(r * f);
  const dg = Math.round(g * f);
  const db = Math.round(b * f);
  return '#' + [dr, dg, db].map(c => c.toString(16).padStart(2, '0')).join('');
}

function hexToRgba(hex, alpha) {
  const raw = String(hex || '').trim().replace(/^#/, '');
  if (!raw) return `rgba(255, 255, 255, ${alpha})`;
  const normalized = raw.length === 3 ? raw.split('').map((ch) => ch + ch).join('') : raw.slice(0, 6);
  if (normalized.length !== 6) return `rgba(255, 255, 255, ${alpha})`;
  const int = Number.parseInt(normalized, 16);
  if (Number.isNaN(int)) return `rgba(255, 255, 255, ${alpha})`;
  const r = (int >> 16) & 255;
  const g = (int >> 8) & 255;
  const b = int & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function normalizeThemeColors(raw) {
  const next = { ...THEME_DEFAULTS };
  for (const [key, value] of Object.entries(raw || {})) {
    if (typeof value === 'string' && value.trim()) next[key] = value.trim();
  }
  return next;
}

let _lastThemeColors = null;

function applyHermesTheme(theme) {
  const colors = normalizeThemeColors(theme?.colors);
  _lastThemeColors = colors;
  const root = document.documentElement;
  root.style.setProperty('--theme-bg', colors.bg);
  root.style.setProperty('--theme-surface', colors.surface);
  root.style.setProperty('--theme-elevated', colors.elevated);
  root.style.setProperty('--theme-border', colors.border);
  root.style.setProperty('--theme-muted', colors.muted);
  root.style.setProperty('--theme-text', colors.text);
  root.style.setProperty('--theme-text-bright', colors.textBright);
  root.style.setProperty('--theme-accent', colors.accent);
  root.style.setProperty('--theme-accent-soft', colors.accentSoft);
  root.style.setProperty('--theme-accent-muted', colors.accentMuted);
  root.style.setProperty('--theme-accent-strong', colors.accentStrong);
  root.style.setProperty('--theme-success', colors.success);
  root.style.setProperty('--theme-warning', colors.warning);
  root.style.setProperty('--theme-danger', colors.danger);
  root.style.setProperty('--theme-bg-deep', hexToRgba(colors.bg, 0.82));
  root.style.setProperty('--theme-scrollbar', hexToRgba(colors.muted, 0.55));
  root.style.setProperty('--theme-scrollbar-hover', hexToRgba(colors.muted, 0.8));
  root.style.setProperty('--theme-accent-surface', hexToRgba(colors.accentStrong, 0.22));
  root.style.setProperty('--theme-danger-surface', hexToRgba(colors.danger, 0.14));
  root.style.setProperty('--theme-accent-glow', hexToRgba(colors.accentMuted, 0.27));
  root.style.setProperty('--theme-accent-glow-strong', hexToRgba(colors.accent, 0.53));
  root.style.setProperty('--theme-success-glow', hexToRgba(colors.success, 0.27));
  root.style.setProperty('--theme-warning-glow', hexToRgba(colors.warning, 0.4));
  root.style.setProperty('--theme-danger-glow', hexToRgba(colors.danger, 0.4));

  // ── Detect light vs dark ──
  const bgLum = relativeLuminance(colors.bg);
  const isLight = bgLum > 0.35;

  // For light themes, also override the general text variables
  if (isLight) {
    root.style.setProperty('--theme-muted',       darkenHex(colors.muted, 0.25));
    root.style.setProperty('--theme-text',        darkenHex(colors.text, 0.45));
    root.style.setProperty('--theme-text-bright', darkenHex(colors.textBright, 0.55));
  }

  // Inject CM overrides after CM has rendered
  requestAnimationFrame(() => injectCMOverrides(colors, isLight));
}

// ── Dynamic CM6 style override injection ──
// CM6 themes use EditorView.theme() which creates generated class names
// (e.g. .ͼ1 .ͼc for comments, .ͼ1 .ͼe for keywords, etc.)
// These rules live in adopted stylesheets or injected <style> tags
// and have specificity we can't reliably beat with static CSS.
//
// Our approach:
// 1. Find every unique class combination on syntax spans inside .cm-line
// 2. Read the computed color for each
// 3. Map the computed color to a "role" (is it the comment color? keyword color? etc.)
//    by comparing against known CM default dark-theme colors
// 4. Build override rules using the exact same class selectors, with our theme colors
// 5. Append the <style> after CM's styles so we win on source order at equal specificity

let _cmOverrideStyle = null;

// Known CM default highlight colors (from Strudel's dark theme / one-dark-ish defaults)
// Used as hints to classify token roles when possible.
const CM_ROLE_HINTS = {
  '#7c7c7c': 'comment', '#7f8c98': 'comment', '#6a9955': 'comment', '#808080': 'comment', '#5c6370': 'comment',
  '#c678dd': 'keyword', '#cc99cd': 'keyword', '#cf8fff': 'keyword', '#c792ea': 'keyword',
  '#e06c75': 'keyword',
  '#98c379': 'string', '#a8ff60': 'string', '#c3e88d': 'string', '#9ece6a': 'string', '#e5c07b': 'string',
  '#d19a66': 'number', '#f78c6c': 'number', '#ffcb6b': 'number',
  '#61afef': 'definition', '#82aaff': 'definition', '#8be9fd': 'definition',
  '#abb2bf': 'variable', '#d4d4d4': 'variable', '#e0e0e0': 'variable',
  '#56b6c2': 'operator', '#89ddff': 'operator',
};

function colorDistance(hex1, hex2) {
  const [r1, g1, b1] = hexToRgb(hex1);
  const [r2, g2, b2] = hexToRgb(hex2);
  return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

function rgbStringToHex(rgb) {
  if (!rgb) return null;
  const m = rgb.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/);
  if (!m) return null;
  return '#' + [m[1], m[2], m[3]].map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
}

// WCAG contrast ratio between two hex colors
function contrastRatio(hex1, hex2) {
  const l1 = relativeLuminance(hex1);
  const l2 = relativeLuminance(hex2);
  const lighter = Math.max(l1, l2);
  const darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

// Darken a color progressively until it meets minimum contrast against bg
function ensureContrast(fgHex, bgHex, minRatio = 4.5) {
  let fg = fgHex;
  for (let step = 0; step < 10; step++) {
    if (contrastRatio(fg, bgHex) >= minRatio) return fg;
    fg = darkenHex(fg, 0.15); // darken 15% each step
  }
  return fg;
}

// Lighten a color for dark backgrounds if needed
function lightenHex(hex, amount) {
  const [r, g, b] = hexToRgb(hex);
  const f = amount;
  const lr = Math.min(255, Math.round(r + (255 - r) * f));
  const lg = Math.min(255, Math.round(g + (255 - g) * f));
  const lb = Math.min(255, Math.round(b + (255 - b) * f));
  return '#' + [lr, lg, lb].map(c => c.toString(16).padStart(2, '0')).join('');
}

function ensureContrastAuto(fgHex, bgHex, minRatio = 4.5) {
  // If bg is light, darken fg. If bg is dark, lighten fg.
  const bgLum = relativeLuminance(bgHex);
  let fg = fgHex;
  for (let step = 0; step < 12; step++) {
    if (contrastRatio(fg, bgHex) >= minRatio) return fg;
    fg = bgLum > 0.5 ? darkenHex(fg, 0.12) : lightenHex(fg, 0.12);
  }
  return fg;
}

function injectCMOverrides(colors, isLight) {
  const cmEditor = document.querySelector('.cm-editor');
  if (!cmEditor) return;

  // Remove previous override sheet
  if (_cmOverrideStyle) {
    _cmOverrideStyle.remove();
    _cmOverrideStyle = null;
  }

  const textColor = isLight ? darkenHex(colors.text, 0.45) : colors.text;
  const mutedColor = isLight ? darkenHex(colors.muted, 0.25) : colors.muted;
  const brightColor = isLight ? darkenHex(colors.textBright, 0.55) : colors.textBright;
  const accentColor = isLight ? darkenHex(colors.accent, 0.50) : colors.accent;
  const surfaceColor = colors.surface;
  const borderColor = colors.border;
  const bgColor = colors.bg;
  const elevatedColor = colors.elevated;

  // Scan syntax spans: read their computed color, ensure contrast against new bg
  const classToColor = {};
  const spans = cmEditor.querySelectorAll('.cm-line span[class]');
  spans.forEach(span => {
    const cls = span.className.trim();
    if (!cls || classToColor[cls] !== undefined) return;
    if (!/ͼ/.test(cls)) return;
    const computed = window.getComputedStyle(span).color;
    const hex = rgbStringToHex(computed);
    if (!hex) return;
    // Ensure this color has readable contrast against the new background
    classToColor[cls] = ensureContrastAuto(hex, bgColor, 4.5);
  });

  // Build syntax override rules
  let syntaxRules = '';
  for (const [cls, color] of Object.entries(classToColor)) {
    const selector = cls.split(/\s+/).filter(Boolean).map(c => `.${c}`).join('');
    syntaxRules += `  .cm-editor ${selector} { color: ${color} !important; }\n`;
  }

  const css = `
/* ── hermelinChat CM6 theme overrides (injected dynamically) ── */

/* Editor chrome */
.cm-editor { background: ${bgColor} !important; color: ${textColor} !important; }
.cm-editor .cm-content { color: ${textColor} !important; caret-color: ${accentColor} !important; }
.cm-editor .cm-cursor, .cm-editor .cm-dropCursor { border-left-color: ${accentColor} !important; }
.cm-editor .cm-gutters { background: ${surfaceColor} !important; color: ${mutedColor} !important; border-right: 1px solid ${borderColor} !important; }
.cm-editor .cm-activeLineGutter { background: ${elevatedColor} !important; color: ${brightColor} !important; }
.cm-editor .cm-activeLine { background: ${elevatedColor} !important; }
.cm-editor .cm-selectionBackground { background: ${hexToRgba(colors.accentStrong, 0.22)} !important; }
.cm-editor .cm-matchingBracket { background: ${hexToRgba(colors.accentStrong, 0.22)} !important; color: ${accentColor} !important; }
.cm-editor .cm-tooltip { background: ${surfaceColor} !important; color: ${textColor} !important; border: 1px solid ${borderColor} !important; }

/* Syntax highlighting — mapped from CM's generated classes */
${syntaxRules}

/* Inline visualizations (pianoroll, scope, punchcard, etc.)
   These render on <canvas> with colors meant for dark backgrounds.
   On light themes, add a dark backdrop so they stay visible. */
${isLight ? `
.cm-editor .cm-widgetBuffer + .cm-line canvas,
.cm-editor .cm-line canvas,
.cm-editor .cm-widget canvas,
.cm-editor canvas {
  background: rgba(0, 0, 0, 0.75) !important;
  border-radius: 4px;
}
/* Also catch the widget wrapper divs that contain canvases */
.cm-editor .cm-widgetBuffer + * canvas,
.cm-editor div[class*="widget"] canvas {
  background: rgba(0, 0, 0, 0.75) !important;
  border-radius: 4px;
}
` : ''}
`;

  _cmOverrideStyle = document.createElement('style');
  _cmOverrideStyle.id = 'hermelin-cm-overrides';
  _cmOverrideStyle.textContent = css;
  document.head.appendChild(_cmOverrideStyle);

  // Clear inline styles CM may have set
  cmEditor.style.backgroundColor = '';
  cmEditor.style.color = '';
  const gutters = cmEditor.querySelector('.cm-gutters');
  if (gutters) { gutters.style.backgroundColor = ''; gutters.style.color = ''; gutters.style.borderRight = ''; }
  const content = cmEditor.querySelector('.cm-content');
  if (content) { content.style.color = ''; content.style.caretColor = ''; }

  console.log('[hermelinChat] CM overrides injected, isLight:', isLight, 'overrides:', Object.keys(classToColor).length);
}

applyHermesTheme({ colors: THEME_DEFAULTS });

window.addEventListener('message', (event) => {
  const message = event.data;
  if (!message || typeof message !== 'object') return;
  if (message.type === 'hermes:artifact-theme') {
    applyHermesTheme(message.theme || null);
    return;
  }
  if (message.type !== 'hermes:artifact-command') return;
  if (String(message.channel || 'strudel') !== 'strudel') return;
  handleHermesCommand(message);
});

// ── AUDIO LEVEL METER ──
const METER_SEGS = 32;
const meterTrack = document.getElementById('meterTrack');
for (let i = 0; i < METER_SEGS; i++) {
  const seg = document.createElement('div');
  seg.className = 'meter-seg';
  meterTrack.appendChild(seg);
}
const meterSegs = meterTrack.querySelectorAll('.meter-seg');
const meterDbEl = document.getElementById('meterDb');

let analyser = null;
let analyserData = null;
let meterRunning = false;
let postFxInput = null;
let audioCtxRef = null;
let audioRoutingPatched = false;

// Patch: intercept connections to audio destination so we can meter them
function setupMeter() {
  try {
    const ctx = typeof getAudioContext === 'function' ? getAudioContext() : null;
    if (!ctx) { setTimeout(setupMeter, 500); return; }
    if (analyser) return; // already set up

    audioCtxRef = ctx;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.65;
    analyserData = new Float32Array(analyser.fftSize);

    if (!masterGain) {
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.64; // (80/100)^2 = 0.64, matches slider default of 80
    }
    if (!postFxInput) {
      postFxInput = ctx.createGain();
    }

    setupEqFilters(ctx);
    rebuildPostFxChain();

    if (!audioRoutingPatched) {
      const origConnect = AudioNode.prototype.connect;
      AudioNode.prototype.connect = function(dest, ...args) {
        const isInternal = this === masterGain || this === analyser || this === postFxInput || eqFilters.includes(this);
        if (!isInternal && (dest === ctx.destination || dest === masterGain)) {
          try { origConnect.call(this, postFxInput); } catch(e) {}
          return dest;
        }
        return origConnect.call(this, dest, ...args);
      };
      audioRoutingPatched = true;
    }

    if (!meterRunning) {
      meterRunning = true;
      meterLoop();
    }
    console.log('[hermelinChat] Audio meter + EQ + master gain ready');
  } catch(e) {
    console.warn('[hermelinChat] Meter setup failed:', e);
  }
}

function meterLoop() {
  requestAnimationFrame(meterLoop);
  if (!analyser || !analyserData) return;

  analyser.getFloatTimeDomainData(analyserData);

  let peak = 0;
  for (let i = 0; i < analyserData.length; i++) {
    const v = Math.abs(analyserData[i]);
    if (v > peak) peak = v;
  }
  const db = peak > 0.0001 ? 20 * Math.log10(peak) : -Infinity;

  const minDb = -50;
  const ratio = Math.max(0, Math.min(1, (db - minDb) / (0 - minDb)));
  const litSegs = Math.round(ratio * METER_SEGS);

  for (let i = 0; i < METER_SEGS; i++) {
    if (i < litSegs) {
      const pos = i / METER_SEGS;
      if (pos > 0.88) meterSegs[i].className = 'meter-seg on-red';
      else if (pos > 0.68) meterSegs[i].className = 'meter-seg on-yellow';
      else meterSegs[i].className = 'meter-seg on-green';
    } else {
      meterSegs[i].className = 'meter-seg';
    }
  }

  if (db > -100) {
    meterDbEl.textContent = db.toFixed(1) + ' dB';
    meterDbEl.style.color = db > -3 ? 'var(--theme-danger)' : db > -10 ? 'var(--theme-warning)' : 'var(--theme-muted)';
  } else {
    meterDbEl.textContent = '-∞ dB';
    meterDbEl.style.color = 'var(--theme-muted)';
  }
}

// Init meter early so the patch is in place before strudel connects anything
setTimeout(setupMeter, 300);

// ── Fix scrollbar: constrain heights via JS after editor renders ──
function fixEditorScroll() {
  const container = document.getElementById('editor-container');
  if (!container) return false;
  const cmEditor = container.querySelector('.cm-editor');
  if (!cmEditor) return false;

  // Get the available height
  const h = container.offsetHeight;
  if (h < 10) return false; // not laid out yet

  // Set max-height on cm-editor so cm-scroller overflows
  cmEditor.style.maxHeight = h + 'px';
  cmEditor.style.overflow = 'hidden';

  // Also constrain the wrapper div between strudel-editor and cm-editor
  const wrapper = cmEditor.parentElement;
  if (wrapper && wrapper !== container && wrapper.tagName !== 'STRUDEL-EDITOR') {
    wrapper.style.maxHeight = h + 'px';
    wrapper.style.overflow = 'hidden';
  }

  console.log('[hermelinChat] Scroll fix applied, height:', h);
  return true;
}

// Try after a delay, and on resize
setTimeout(() => {
  if (!fixEditorScroll()) {
    const iv2 = setInterval(() => {
      if (fixEditorScroll()) clearInterval(iv2);
    }, 500);
  }
}, 1000);
window.addEventListener('resize', () => fixEditorScroll());
</script>
