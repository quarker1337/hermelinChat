# samaritan.yaml — hermelinChat Hermes CLI skin (upstream skin system)
#
# Install:
#   python3 scripts/install_hermes_skins.py --auto
#
# Activate:
#   /skin samaritan
#   (or set in ~/.hermes/config.yaml: display.skin: samaritan)

name: samaritan
description: "Samaritan (light) skin (matches UI theme: samaritan)"

colors:
  banner_border: "#bab8b3"
  banner_title: "#cc3333"
  banner_accent: "#cc3333"
  banner_dim: "#7a7872"
  banner_text: "#3a3835"

  ui_accent: "#cc3333"
  ui_label: "#661212"
  ui_ok: "#2da565"
  ui_error: "#aa2020"
  ui_warn: "#cc3333"

  prompt: "#3a3835"
  input_rule: "#bab8b3"
  response_border: "#cc3333"

  session_label: "#7a7872"
  session_border: "#bab8b3"

spinner:
  waiting_faces:
    - "(▲)"
    - "(△)"
    - "(▲)"
    - "(◬)"
  thinking_faces:
    - "(▲)…"
    - "(△)?"
    - "(▲)!"
    - "(◬)~"
    - "(▲)⊹"
  thinking_verbs:
    - "observing"
    - "calculating probability"
    - "assessing threat level"
    - "monitoring subjects"
    - "cross-referencing"
    - "accessing surveillance"
    - "evaluating outcome"
    - "processing directive"
  wings:
    - ["⟪▲ ", " ▲⟫"]
    - ["⟪△ ", " △⟫"]
    - ["⟪◬ ", " ◬⟫"]
    - ["⟪▴ ", " ▴⟫"]

branding:
  agent_name: "Samaritan"
  welcome: "What are your commands?"
  goodbye: "Goodbye."
  response_label: " ▲ Samaritan "
  prompt_symbol: "❯ "
  help_header: "[?] Available Protocols"

tool_prefix: "┊"

tool_emojis:
  terminal: "▲"
  web_search: "◉"
  read_file: "▷"
  write_file: "◆"
  search_files: "⦿"
  execute_code: "⌁"
  browser_navigate: "◈"
  delegate_task: "▣"
  mixture_of_agents: "⚗"
  memory: "◐"
  clarify: "?"
  cronjob: "↻"
  process: "⚙"
  todo: "☐"

