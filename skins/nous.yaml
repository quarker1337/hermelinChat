# nous.yaml — hermelinChat Hermes CLI skin (upstream skin system)
#
# Install:
#   python3 scripts/install_hermes_skins.py --auto
#
# Activate:
#   /skin nous
#   (or set in ~/.hermes/config.yaml: display.skin: nous)

name: nous
description: "Nous Research dusk skin (matches UI theme: nous)"

colors:
  banner_border: "#2e3860"
  banner_title: "#88b8f0"
  banner_accent: "#88b8f0"
  banner_dim: "#3868a0"
  banner_text: "#a0b0d0"

  ui_accent: "#88b8f0"
  ui_label: "#d0d8f0"
  ui_ok: "#80c088"
  ui_error: "#d08888"
  ui_warn: "#e0c868"

  prompt: "#a0b0d0"
  input_rule: "#2e3860"
  response_border: "#88b8f0"

  session_label: "#6878a0"
  session_border: "#2e3860"

spinner:
  waiting_faces:
    - "(◡‿◡)"
    - "(◠‿◠)"
    - "(◡ᴗ◡)"
    - "(◠ω◠)"
  thinking_faces:
    - "(◡‿◡)?"
    - "(◠‿◠)~"
    - "(◡ᴗ◡)…"
    - "(◠ω◠)♪"
    - "(◡‿◡)!"
  thinking_verbs:
    - "aligning"
    - "researching"
    - "contemplating"
    - "reasoning through"
    - "synthesizing"
    - "exploring the space"
    - "consulting the archive"
    - "inference in progress"
  wings:
    - ["⟪◡‿", "‿◡⟫"]
    - ["⟪◠‿", "‿◠⟫"]
    - ["⟪◡ᴗ", "ᴗ◡⟫"]
    - ["⟪◠ω", "ω◠⟫"]

branding:
  agent_name: "Nous://Hermes"
  welcome: "Welcome to Nous://Hermes! Type your message or /help for commands."
  goodbye: "Goodbye! ⚕"
  response_label: " ⚕ Nous://Hermes "
  prompt_symbol: "❯ "
  help_header: "(^_^)? Available Commands"

tool_prefix: "│"

tool_emojis:
  terminal: "⚕"
  web_search: "🔍"
  read_file: "📖"
  write_file: "✏"
  search_files: "🔎"
  execute_code: "⚡"
  browser_navigate: "🌐"
  delegate_task: "📤"
  mixture_of_agents: "⚗"
  memory: "🧠"
  clarify: "❓"
  cronjob: "⏰"
  process: "⚙"
  todo: "☐"

